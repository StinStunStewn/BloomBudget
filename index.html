const login = () => {\n    if (pw === ADMIN_PASSWORD) { setAuthed(true); setPwError(false); }\n    else { setPwError(true); setPw(\"\"); }\n  };\n\n  const save = () => {\n    saveAdminConfig(cfg);\n    setSaved(true);\n    setTimeout(() => setSaved(false), 2000);\n  };\n\n  const inputStyle = {\n    width: \"100%\", padding: \"11px 14px\", borderRadius: \"var(--radius-sm)\",\n    border: \"1.5px solid var(--border)\", background: \"var(--surface2)\",\n    fontFamily: \"Nunito\", fontSize: \"14px\", color: \"var(--text)\", outline: \"none\",\n    boxSizing: \"border-box\",\n  };\n\n  return (\n    <div style={{\n      position: \"fixed\", inset: 0, zIndex: 300,\n      background: \"rgba(10,6,14,0.92)\", backdropFilter: \"blur(10px)\",\n      display: \"flex\", alignItems: \"center\", justifyContent: \"center\", padding: \"24px\",\n    }}>\n      <div style={{\n        background: \"var(--surface)\", borderRadius: \"20px\", padding: \"28px\",\n        width: \"100%\", maxWidth: \"400px\", border: \"1px solid var(--border)\",\n        boxShadow: \"var(--shadow-lg)\",\n      }}>\n        <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"center\", marginBottom: \"22px\" }}>\n          <div style={{ fontWeight: 700, fontSize: \"18px\", color: \"var(--text)\", fontFamily: \"Nunito\" }}>\n            {authed ? \"Admin settings\" : \"Admin access\"}\n          </div>\n          <button onClick={onClose} style={{ background: \"none\", border: \"none\", color: \"var(--text3)\", cursor: \"pointer\", fontSize: \"20px\", padding: \"4px\" }}>\u00d7</button>\n        </div>\n\n        {!authed ? (\n          <div>\n            <div style={{ fontSize: \"13px\", color: \"var(--text3)\", marginBottom: \"16px\" }}>\n              This area is for the app owner only.\n            </div>\n            <input\n              type=\"password\" value={pw} onChange={e => { setPw(e.target.value); setPwError(false); }}\n              onKeyDown={e => e.key === \"Enter\" && login()}\n              placeholder=\"Enter password\" style={{ ...inputStyle, marginBottom: \"10px\" }}\n              autoFocus\n            />\n            {pwError && <div style={{ fontSize: \"12px\", color: \"var(--berry)\", marginBottom: \"10px\" }}>Incorrect password</div>}\n            <button onClick={login} style={{\n              width: \"100%\", padding: \"12px\", borderRadius: \"100px\", border: \"none\",\n              background: \"var(--berry)\", color: \"white\", fontFamily: \"Nunito\",\n              fontSize: \"14px\", fontWeight: 700, cursor: \"pointer\",\n            }}>\n              Unlock\n            </button>\n          </div>\n        ) : (\n          <div>\n            <div style={{ fontSize: \"12px\", color: \"var(--text3)\", textTransform: \"uppercase\", letterSpacing: \"0.06em\", marginBottom: \"6px\" }}>Ko-fi URL</div>\n            <input value={cfg.kofiUrl} onChange={e => setCfg(c => ({ ...c, kofiUrl: e.target.value }))}\n              style={{ ...inputStyle, marginBottom: \"16px\" }} placeholder=\"https://ko-fi.com/yourname\" />\n\n            <div style={{ fontSize: \"12px\", color: \"var(--text3)\", textTransform: \"uppercase\", letterSpacing: \"0.06em\", marginBottom: \"6px\" }}>Feedback email</div>\n            <input value={cfg.feedbackEmail} onChange={e => setCfg(c => ({ ...c, feedbackEmail: e.target.value }))}\n              style={{ ...inputStyle, marginBottom: \"16px\" }} placeholder=\"your@email.com\" />\n\n            <div style={{ fontSize: \"12px\", color: \"var(--text3)\", textTransform: \"uppercase\", letterSpacing: \"0.06em\", marginBottom: \"6px\" }}>Admin password</div>\n            <input value={cfg.adminPassword || \"\"} onChange={e => setCfg(c => ({ ...c, adminPassword: e.target.value }))}\n              style={{ ...inputStyle, marginBottom: \"6px\" }} placeholder=\"Leave blank to keep current\" type=\"password\" />\n            <div style={{ fontSize: \"11px\", color: \"var(--text3)\", marginBottom: \"16px\" }}>\n              Changing this only takes effect after saving and reloading.\n            </div>\n\n            <button onClick={save} style={{\n              width: \"100%\", padding: \"12px\", borderRadius: \"100px\", border: \"none\",\n              background: saved ? \"var(--sage)\" : \"var(--berry)\", color: \"white\",\n              fontFamily: \"Nunito\", fontSize: \"14px\", fontWeight: 700, cursor: \"pointer\",\n              transition: \"background 0.2s\",\n            }}>\n              {saved ? \"Saved!\" : \"Save settings\"}\n            </button>\n          </div>\n        )}\n      </div>\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500 Tutorial Modal \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst TUTORIAL_SLIDES = [\n  {\n    icon: \"\ud83c\udf38\",\n    title: \"Welcome to BloomBudget\",\n    body: \"A budget tracker built for real life \u2014 warm, simple, and judgment-free. This quick tour covers everything you need to get started. Tap Next whenever you're ready.\",\n    color: \"#E8809A\",\n  },\n  {\n    icon: \"\uff0b\",\n    title: \"Adding expenses\",\n    body: \"Tap Add expense on the Expenses page to log anything \u2014 a coffee, a subscription, your rent. Give it a name, amount, category, and account. That's all you need.\",\n    tip: \"The date auto-fills to today, but you can change it to log past expenses too.\",\n    color: \"#F0A870\",\n  },\n  {\n    icon: \"\ud83d\uddc2\",\n    title: \"Categories\",\n    body: \"Categories are the broad buckets \u2014 Food, Transport, Health, Pet Food, and so on. They power your statistics and budget tracking. You can add your own and pick a colour in Settings.\",\n    tip: \"Keep categories broad. Use tags for the detail.\",\n    color: \"#70D098\",\n  },\n  {\n    icon: \"#\",\n    title: \"Tags \u2014 the secret weapon\",\n    body: \"Tags cut across categories. For example, tag everything related to a pet, a person, or a project \u2014 food, vet bills, gear \u2014 and see the combined total in one place under Statistics \u2192 Tags.\",\n    tip: \"One expense can have multiple tags. Add them in the expense form.\",\n    color: \"#E8C860\",\n  },\n  {\n    icon: \"\u21ba\",\n    title: \"Recurring payments\",\n    body: \"When adding an expense, tick Recurring and set the day of the month. It will show up on your Payment Calendar so you always know what's coming and when.\",\n    tip: \"Streaming services, rent, insurance, subscriptions \u2014 set them up once and bloom keeps track so you don't have to.\",\n    color: \"#F08898\",\n  },\n  {\n    icon: \"\u25ce\",\n    title: \"Budgets\",\n    body: \"Set a monthly limit for any category on the Budgets page. bloom will show you a progress bar and warn you gently if you're getting close \u2014 no alarms, just awareness.\",\n    color: \"#70B8E0\",\n  },\n  {\n    icon: \"\u2726\",\n    title: \"Smart Analysis\",\n    body: \"Head to Analysis and tap Analyse to get a warm, personalised breakdown of your spending \u2014 top categories, patterns, and a gentle tip for next month. Powered by AI.\",\n    tip: \"Works best once you have a few weeks of data.\",\n    color: \"#C0A0F0\",\n  },\n  {\n    icon: \"\u2193\",\n    title: \"Export to Excel\",\n    body: \"In Settings \u2192 Export, you can download your data as a spreadsheet \u2014 by week, month, year, or all time. Filter by category or tag. Great for tax time or sharing with a partner.\",\n    color: \"#7EC8A0\",\n  },\n  {\n    icon: \"\u2665\",\n    title: \"You're all set\",\n    body: \"bloom saves everything automatically. Your data lives on your device and is completely private. If you ever have questions or ideas, the feedback button is always in Settings.\",\n    tip: \"You can replay this tour anytime from Settings \u2192 General.\",\n    color: \"#E8809A\",\n  },\n];\n\nfunction TutorialModal({ onClose }) {\n  const [step, setStep] = useState(0);\n  const slide = TUTORIAL_SLIDES[step];\n  const isLast = step === TUTORIAL_SLIDES.length - 1;\n  const isFirst = step === 0;\n\n  return (\n    <div style={{\n      position: \"fixed\", inset: 0, zIndex: 200,\n      background: \"rgba(10,6,14,0.85)\", backdropFilter: \"blur(8px)\",\n      display: \"flex\", alignItems: \"flex-end\", justifyContent: \"center\",\n      padding: \"0 0 env(safe-area-inset-bottom)\",\n    }}>\n      <div style={{\n        background: \"var(--surface)\", borderRadius: \"24px 24px 0 0\",\n        width: \"100%\", maxWidth: \"520px\", padding: \"32px 28px 36px\",\n        boxShadow: \"0 -8px 40px rgba(0,0,0,0.5)\",\n        border: \"1px solid var(--border)\", borderBottom: \"none\",\n        minHeight: \"420px\", display: \"flex\", flexDirection: \"column\",\n      }}>\n\n        {/* Progress dots */}\n        <div style={{ display: \"flex\", gap: \"6px\", justifyContent: \"center\", marginBottom: \"28px\" }}>\n          {TUTORIAL_SLIDES.map((_, i) => (\n            <div key={i} onClick={() => setStep(i)} style={{\n              width: i === step ? \"20px\" : \"6px\", height: \"6px\",\n              borderRadius: \"100px\", cursor: \"pointer\",\n              background: i === step ? slide.color : \"var(--border)\",\n              transition: \"all 0.25s ease\",\n            }} />\n          ))}\n        </div>\n\n        {/* Icon */}\n        <div style={{\n          width: \"64px\", height: \"64px\", borderRadius: \"18px\",\n          background: slide.color + \"25\", border: \"1.5px solid \" + slide.color + \"60\",\n          display: \"flex\", alignItems: \"center\", justifyContent: \"center\",\n          fontSize: \"28px\", marginBottom: \"20px\", fontWeight: 700,\n          color: slide.color, fontFamily: \"Nunito\",\n        }}>\n          {slide.icon}\n        </div>\n\n        {/* Content */}\n        <div style={{ flex: 1 }}>\n          <div style={{\n            fontFamily: \"Nunito\", fontWeight: 700, fontSize: \"22px\",\n            color: \"var(--text)\", marginBottom: \"12px\", lineHeight: 1.2,\n          }}>\n            {slide.title}\n          </div>\n          <div style={{\n            fontSize: \"15px\", color: \"var(--text2)\", lineHeight: 1.65,\n            marginBottom: slide.tip ? \"14px\" : 0,\n          }}>\n            {slide.body}\n          </div>\n          {slide.tip && (\n            <div style={{\n              fontSize: \"13px\", color: slide.color, lineHeight: 1.55,\n              background: slide.color + \"15\", borderRadius: \"10px\",\n              padding: \"10px 14px\", borderLeft: \"3px solid \" + slide.color,\n            }}>\n              {slide.tip}\n            </div>\n          )}\n        </div>\n\n        {/* Buttons */}\n        <div style={{ display: \"flex\", gap: \"10px\", marginTop: \"28px\", alignItems: \"center\" }}>\n          {!isFirst && (\n            <button onClick={() => setStep(s => s - 1)}\n              style={{ padding: \"12px 18px\", borderRadius: \"100px\", border: \"1.5px solid var(--border)\", background: \"none\", fontFamily: \"Nunito\", fontSize: \"14px\", color: \"var(--text3)\", cursor: \"pointer\" }}>\n              Back\n            </button>\n          )}\n          <button onClick={isLast ? onClose : () => setStep(s => s + 1)}\n            style={{\n              flex: 1, padding: \"14px\", borderRadius: \"100px\", border: \"none\",\n              background: slide.color, color: \"white\", fontFamily: \"Nunito\",\n              fontSize: \"15px\", fontWeight: 700, cursor: \"pointer\",\n              boxShadow: \"0 4px 16px \" + slide.color + \"50\",\n              transition: \"all 0.15s\",\n            }}>\n            {isLast ? \"Let's go\" : \"Next\"}\n          </button>\n          {!isLast && (\n            <button onClick={onClose}\n              style={{ padding: \"12px 18px\", borderRadius: \"100px\", border: \"none\", background: \"none\", fontFamily: \"Nunito\", fontSize: \"13px\", color: \"var(--text3)\", cursor: \"pointer\" }}>\n              Skip\n            </button>\n          )}\n        </div>\n      </div>\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500 Export Tab \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction ExportTab({ data }) {\n  const [period, setPeriod] = useState(\"month\");\n  const [filterType, setFilterType] = useState(\"all\");\n  const [filterValue, setFilterValue] = useState(\"\");\n  const [customFrom, setCustomFrom] = useState(\"\");\n  const [customTo, setCustomTo] = useState(\"\");\n  const [exporting, setExporting] = useState(false);\n  const [done, setDone] = useState(false);\n  const [error, setError] = useState(null);\n\n  const getCat = id => data.categories.find(c => c.id === id);\n  const getAcc = id => data.accounts.find(a => a.id === id);\n\n  const allTags = [...new Set(data.expenses.flatMap(e => e.tags || []))].sort();\n\n  const getDateRange = () => {\n    const now = new Date();\n    if (period === \"week\") {\n      const mon = new Date(now); mon.setDate(now.getDate() - now.getDay() + 1); mon.setHours(0,0,0,0);\n      const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);\n      return [mon, sun];\n    }\n    if (period === \"month\") {\n      return [new Date(now.getFullYear(), now.getMonth(), 1), new Date(now.getFullYear(), now.getMonth()+1, 0, 23, 59, 59)];\n    }\n    if (period === \"year\") {\n      return [new Date(now.getFullYear(), 0, 1), new Date(now.getFullYear(), 11, 31, 23, 59, 59)];\n    }\n    if (period === \"custom\") {\n      return [customFrom ? new Date(customFrom) : new Date(0), customTo ? new Date(customTo + \"T23:59:59\") : new Date()];\n    }\n    return [new Date(0), new Date()]; // all time\n  };\n\n  const getFilteredExpenses = () => {\n    const [from, to] = getDateRange();\n    return data.expenses.filter(e => {\n      if (!e.date) return false;\n      const d = new Date(e.date);\n      if (d < from || d > to) return false;\n      if (filterType === \"category\" && filterValue && e.categoryId !== filterValue) return false;\n      if (filterType === \"tag\" && filterValue && !(e.tags || []).includes(filterValue)) return false;\n      return true;\n    }).sort((a, b) => new Date(a.date) - new Date(b.date));\n  };\n\n  const previewCount = getFilteredExpenses().length;\n\n  const loadXLSX = () => new Promise((resolve, reject) => {\n    if (window.XLSX) return resolve(window.XLSX);\n    const s = document.createElement(\"script\");\n    s.src = \"https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js\";\n    s.onload = () => resolve(window.XLSX);\n    s.onerror = reject;\n    document.head.appendChild(s);\n  });\n\n  const doExport = async () => {\n    setExporting(true);\n    setDone(false);\n    setError(null);\n    const expenses = getFilteredExpenses();\n\n    // \u2500\u2500 Sheet 1: All Transactions \u2500\u2500\n    const txRows = expenses.map(e => ({\n      \"Date\": e.date,\n      \"Name\": e.name,\n      \"Amount (\u20ac)\": e.amount,\n      \"Category\": getCat(e.categoryId)?.name || \"\",\n      \"Account\": getAcc(e.accountId)?.name || \"\",\n      \"Type\": e.type || \"\",\n      \"Recurring\": e.recurring ? \"Yes\" : \"No\",\n      \"Recurring Period\": e.recurring ? (e.recurringPeriod || \"\") : \"\",\n      \"Recurring Day\": e.recurring ? (e.recurringDay || \"\") : \"\",\n      \"Tags\": (e.tags || []).join(\", \"),\n      \"Note\": e.note || \"\",\n    }));\n\n    // \u2500\u2500 Sheet 2: Summary by Category \u2500\u2500\n    const catMap = {};\n    expenses.forEach(e => {\n      const name = getCat(e.categoryId)?.name || \"Unknown\";\n      if (!catMap[name]) catMap[name] = { count: 0, total: 0 };\n      catMap[name].count++;\n      catMap[name].total += e.amount;\n    });\n    const total = expenses.reduce((s, e) => s + e.amount, 0);\n    const catRows = Object.entries(catMap).sort((a,b) => b[1].total - a[1].total).map(([cat, v]) => ({\n      \"Category\": cat,\n      \"Transactions\": v.count,\n      \"Total (\u20ac)\": parseFloat(v.total.toFixed(2)),\n      \"% of Total\": total > 0 ? parseFloat((v.total / total * 100).toFixed(1)) : 0,\n    }));\n    catRows.push({ \"Category\": \"TOTAL\", \"Transactions\": expenses.length, \"Total (\u20ac)\": parseFloat(total.toFixed(2)), \"% of Total\": 100 });\n\n    // \u2500\u2500 Sheet 3: Summary by Tag \u2500\u2500\n    const tagMap = {};\n    expenses.forEach(e => {\n      (e.tags || []).forEach(t => {\n        if (!tagMap[t]) tagMap[t] = { count: 0, total: 0 };\n        tagMap[t].count++;\n        tagMap[t].total += e.amount;\n      });\n    });\n    const tagRows = Object.entries(tagMap).sort((a,b) => b[1].total - a[1].total).map(([tag, v]) => ({\n      \"Tag\": tag,\n      \"Transactions\": v.count,\n      \"Total (\u20ac)\": parseFloat(v.total.toFixed(2)),\n    }));\n    if (!tagRows.length) tagRows.push({ \"Tag\": \"No tags in this period\", \"Transactions\": 0, \"Total (\u20ac)\": 0 });\n\n    // \u2500\u2500 Sheet 4: Summary by Account \u2500\u2500\n    const accMap = {};\n    expenses.forEach(e => {\n      const name = getAcc(e.accountId)?.name || \"Unknown\";\n      if (!accMap[name]) accMap[name] = { count: 0, total: 0 };\n      accMap[name].count++;\n      accMap[name].total += e.amount;\n    });\n    const accRows = Object.entries(accMap).sort((a,b) => b[1].total - a[1].total).map(([acc, v]) => ({\n      \"Account\": acc,\n      \"Transactions\": v.count,\n      \"Total (\u20ac)\": parseFloat(v.total.toFixed(2)),\n    }));\n\n    // \u2500\u2500 Sheet 5: Monthly Breakdown \u2500\u2500\n    const monthMap = {};\n    data.expenses.forEach(e => {\n      const m = e.date?.slice(0,7);\n      if (!m) return;\n      if (!monthMap[m]) monthMap[m] = 0;\n      monthMap[m] += e.amount;\n    });\n    const monthRows = Object.entries(monthMap).sort().map(([m, v]) => ({\n      \"Month\": m,\n      \"Total (\u20ac)\": parseFloat(v.toFixed(2)),\n    }));\n\n    // \u2500\u2500 Build workbook \u2500\u2500\n    let XL;\n    try { XL = await loadXLSX(); } catch(e) { setError(\"Could not load Excel library. Check your connection.\"); setExporting(false); return; }\n\n    const wb = XL.utils.book_new();\n\n    const addSheet = (name, rows) => {\n      const ws = XL.utils.json_to_sheet(rows);\n      const cols = Object.keys(rows[0] || {});\n      ws[\"!cols\"] = cols.map(k => ({ wch: Math.max(k.length, 14) }));\n      XL.utils.book_append_sheet(wb, ws, name);\n    };\n\n    const periodLabel = { week: \"This Week\", month: \"This Month\", year: \"This Year\", all: \"All Time\", custom: \"Custom Range\" }[period];\n    const filterLabel = filterType === \"category\" && filterValue ? ` \u2014 ${getCat(filterValue)?.name}` : filterType === \"tag\" && filterValue ? ` \u2014 #${filterValue}` : \"\";\n\n    if (txRows.length) addSheet(\"Transactions\", txRows);\n    else addSheet(\"Transactions\", [{ \"Note\": \"No transactions in this period\" }]);\n    addSheet(\"By Category\", catRows);\n    if (tagRows.length) addSheet(\"By Tag\", tagRows);\n    addSheet(\"By Account\", accRows);\n    addSheet(\"Monthly Overview\", monthRows);\n\n    // \u2500\u2500 Summary sheet \u2500\u2500\n    const summaryData = [\n      { \"\": \"Export generated\", \"Value\": new Date().toLocaleDateString(\"de-DE\") },\n      { \"\": \"Period\", \"Value\": periodLabel + filterLabel },\n      { \"\": \"Transactions included\", \"Value\": expenses.length },\n      { \"\": \"Total amount\", \"Value\": parseFloat(total.toFixed(2)) },\n      { \"\": \"\", \"Value\": \"\" },\n      { \"\": \"bloom budget app\", \"Value\": \"your money, kindly\" },\n    ];\n    const sumWs = XL.utils.json_to_sheet(summaryData, { skipHeader: true });\n    sumWs[\"!cols\"] = [{ wch: 26 }, { wch: 30 }];\n    XL.utils.book_append_sheet(wb, sumWs, \"Summary\");\n    // Move Summary to front\n    wb.SheetNames = [\"Summary\", ...wb.SheetNames.filter(s => s !== \"Summary\")];\n\n    const filename = `bloom_export_${period}_${new Date().toISOString().slice(0,10)}.xlsx`;\n    XL.writeFile(wb, filename);\n\n    setExporting(false);\n    setDone(true);\n    setTimeout(() => setDone(false), 3000);\n  };\n\n  const fieldStyle = { padding: \"9px 13px\", borderRadius: \"var(--radius-sm)\", border: \"1.5px solid var(--border)\", background: \"var(--surface2)\", fontFamily: \"Nunito\", fontSize: \"13px\", color: \"var(--text)\", outline: \"none\", width: \"100%\" };\n\n  return (\n    <div>\n      <div className=\"card\" style={{ marginBottom: \"14px\" }}>\n        <div style={{ fontWeight: 600, fontSize: \"15px\", marginBottom: \"14px\", color: \"var(--text)\" }}>Time period</div>\n        <div style={{ display: \"flex\", gap: \"8px\", flexWrap: \"wrap\", marginBottom: period === \"custom\" ? \"14px\" : 0 }}>\n          {[[\"week\",\"This week\"],[\"month\",\"This month\"],[\"year\",\"This year\"],[\"all\",\"All time\"],[\"custom\",\"Custom\"]].map(([v,l]) => (\n            <button key={v} onClick={() => setPeriod(v)}\n              style={{ padding: \"8px 14px\", borderRadius: \"100px\", border: \"1.5px solid\", cursor: \"pointer\", fontFamily: \"Nunito\", fontSize: \"13px\", fontWeight: period === v ? 700 : 400,\n                borderColor: period === v ? \"var(--berry)\" : \"var(--border)\",\n                background: period === v ? \"var(--berry-light)\" : \"var(--surface2)\",\n                color: period === v ? \"var(--berry)\" : \"var(--text2)\" }}>\n              {l}\n            </button>\n          ))}\n        </div>\n        {period === \"custom\" && (\n          <div style={{ display: \"grid\", gridTemplateColumns: \"1fr 1fr\", gap: \"10px\", marginTop: \"12px\" }}>\n            <div className=\"field\" style={{ marginBottom: 0 }}>\n              <label>From</label>\n              <input type=\"date\" value={customFrom} onChange={e => setCustomFrom(e.target.value)} style={fieldStyle} />\n            </div>\n            <div className=\"field\" style={{ marginBottom: 0 }}>\n              <label>To</label>\n              <input type=\"date\" value={customTo} onChange={e => setCustomTo(e.target.value)} style={fieldStyle} />\n            </div>\n          </div>\n        )}\n      </div>\n\n      <div className=\"card\" style={{ marginBottom: \"14px\" }}>\n        <div style={{ fontWeight: 600, fontSize: \"15px\", marginBottom: \"14px\", color: \"var(--text)\" }}>Filter by</div>\n        <div style={{ display: \"flex\", gap: \"8px\", marginBottom: \"12px\", flexWrap: \"wrap\" }}>\n          {[[\"all\",\"No filter\"],[\"category\",\"Category\"],[\"tag\",\"Tag\"]].map(([v,l]) => (\n            <button key={v} onClick={() => { setFilterType(v); setFilterValue(\"\"); }}\n              style={{ padding: \"8px 14px\", borderRadius: \"100px\", border: \"1.5px solid\", cursor: \"pointer\", fontFamily: \"Nunito\", fontSize: \"13px\", fontWeight: filterType === v ? 700 : 400,\n                borderColor: filterType === v ? \"var(--sage)\" : \"var(--border)\",\n                background: filterType === v ? \"var(--sage-light)\" : \"var(--surface2)\",\n                color: filterType === v ? \"var(--sage)\" : \"var(--text2)\" }}>\n              {l}\n            </button>\n          ))}\n        </div>\n        {filterType === \"category\" && (\n          <select value={filterValue} onChange={e => setFilterValue(e.target.value)} style={fieldStyle}>\n            <option value=\"\">All categories</option>\n            {data.categories.map(c => <option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}\n          </select>\n        )}\n        {filterType === \"tag\" && (\n          <select value={filterValue} onChange={e => setFilterValue(e.target.value)} style={fieldStyle}>\n            <option value=\"\">All tags</option>\n            {allTags.map(t => <option key={t} value={t}>#{t}</option>)}\n          </select>\n        )}\n      </div>\n\n      <div className=\"card\" style={{ marginBottom: \"16px\", background: \"var(--surface2)\", display: \"flex\", alignItems: \"center\", justifyContent: \"space-between\", flexWrap: \"wrap\", gap: \"10px\" }}>\n        <div>\n          <div style={{ fontSize: \"13px\", color: \"var(--text2)\" }}>Ready to export</div>\n          <div style={{ fontWeight: 700, fontSize: \"22px\", color: \"var(--text)\", fontFamily: \"Nunito\" }}>{previewCount} transaction{previewCount !== 1 ? \"s\" : \"\"}</div>\n          <div style={{ fontSize: \"12px\", color: \"var(--text3)\", marginTop: \"2px\" }}>5 sheets: Summary, Transactions, By Category, By Tag, By Account + Monthly Overview</div>\n        </div>\n      </div>\n\n      {error && <div style={{ color: \"var(--berry)\", fontSize: \"13px\", marginBottom: \"10px\", padding: \"10px 14px\", background: \"var(--berry-light)\", borderRadius: \"var(--radius-sm)\" }}>{error}</div>}\n      <button className=\"btn btn-primary\" onClick={doExport} disabled={exporting || previewCount === 0}\n        style={{ width: \"100%\", justifyContent: \"center\", padding: \"14px\", fontSize: \"15px\", fontWeight: 700, opacity: previewCount === 0 ? 0.5 : 1 }}>\n        {exporting ? \"Preparing...\" : done ? \"Downloaded!\" : \"Download Excel file\"}\n      </button>\n      {previewCount === 0 && <div style={{ fontSize: \"12px\", color: \"var(--text3)\", textAlign: \"center\", marginTop: \"8px\" }}>No transactions match the current filters</div>}\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500 Settings Page \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction SettingsPage({ data, setData, onShowTutorial }) {\n  const [tab, setTab] = useState(\"categories\");\n  const [catForm, setCatForm] = useState({ name: \"\", color: COLORS[0], icon: \"\u2728\" });\n  const [accForm, setAccForm] = useState({ name: \"\", color: COLORS[0], icon: \"\ud83c\udfe6\" });\n\n  const addCat = () => {\n    if (!catForm.name.trim()) return;\n    setData(d => ({ ...d, categories: [...d.categories, { id: uid(), ...catForm }] }));\n    setCatForm({ name: \"\", color: COLORS[0], icon: \"\u2728\" });\n  };\n  const deleteCat = (id) => setData(d => ({ ...d, categories: d.categories.filter(c => c.id !== id) }));\n\n  const addAcc = () => {\n    if (!accForm.name.trim()) return;\n    setData(d => ({ ...d, accounts: [...d.accounts, { id: uid(), ...accForm }] }));\n    setAccForm({ name: \"\", color: COLORS[0], icon: \"\ud83c\udfe6\" });\n  };\n  const deleteAcc = (id) => setData(d => ({ ...d, accounts: d.accounts.filter(a => a.id !== id) }));\n\n  return (\n    <div className=\"page\">\n      <div className=\"page-header\">\n        <div>\n          <div className=\"page-title\">Settings</div>\n          <div className=\"page-subtitle\">Make it yours</div>\n        </div>\n      </div>\n\n      <div className=\"tabs\">\n        {[\"categories\", \"accounts\", \"general\", \"export\", \"about\"].map(t => <button key={t} className={`tab ${tab === t ? \"active\" : \"\"}`} onClick={() => setTab(t)}>{t.charAt(0).toUpperCase()+t.slice(1)}</button>)}\n      </div>\n\n      {tab === \"categories\" && (\n        <div>\n          <div className=\"card\" style={{ marginBottom: \"16px\" }}>\n            <div style={{ fontFamily: \"Nunito\", fontSize: \"15px\", marginBottom: \"14px\" }}>Add category</div>\n            <div className=\"form-row\">\n              <div className=\"field\">\n                <label>Icon (emoji)</label>\n                <input value={catForm.icon} onChange={e => setCatForm(f => ({ ...f, icon: e.target.value }))} maxLength={2} style={{ width: \"60px\", textAlign: \"center\", fontSize: \"18px\", background: \"var(--surface2)\", color: \"var(--text)\", border: \"1.5px solid var(--border)\", borderRadius: \"8px\", padding: \"8px\", fontFamily: \"Nunito\", outline: \"none\" }} />\n              </div>\n              <div className=\"field\">\n                <label>Name</label>\n                <input value={catForm.name} onChange={e => setCatForm(f => ({ ...f, name: e.target.value }))} placeholder=\"Category name\" />\n              </div>\n            </div>\n            <div className=\"field\">\n              <label>Colour</label>\n              <div className=\"color-row\">\n                {COLORS.map(c => <div key={c} className={`color-swatch ${catForm.color === c ? \"selected\" : \"\"}`} style={{ background: c }} onClick={() => setCatForm(f => ({ ...f, color: c }))} />)}\n              </div>\n            </div>\n            <button className=\"btn btn-primary btn-sm\" onClick={addCat}><Icon name=\"plus\" size={13} /> Add</button>\n          </div>\n          <div className=\"card\">\n            {data.categories.map(c => (\n              <div key={c.id} style={{ display: \"flex\", alignItems: \"center\", gap: \"12px\", padding: \"8px 0\", borderBottom: \"1px solid var(--border)\" }}>\n                <div style={{ width: \"12px\", height: \"12px\", borderRadius: \"50%\", background: c.color }} />\n                <span style={{ fontSize: \"18px\" }}>{c.icon}</span>\n                <span style={{ flex: 1, fontSize: \"14px\" }}>{c.name}</span>\n                <button className=\"btn-icon\" onClick={() => deleteCat(c.id)}><Icon name=\"trash\" size={13} /></button>\n              </div>\n            ))}\n          </div>\n        </div>\n      )}\n\n      {tab === \"accounts\" && (\n        <div>\n          <div className=\"card\" style={{ marginBottom: \"16px\" }}>\n            <div style={{ fontFamily: \"Nunito\", fontSize: \"15px\", marginBottom: \"14px\" }}>Add account</div>\n            <div className=\"form-row\">\n              <div className=\"field\">\n                <label>Icon (emoji)</label>\n                <input value={accForm.icon} onChange={e => setAccForm(f => ({ ...f, icon: e.target.value }))} maxLength={2} style={{ width: \"60px\", textAlign: \"center\", fontSize: \"18px\", background: \"var(--surface2)\", color: \"var(--text)\", border: \"1.5px solid var(--border)\", borderRadius: \"8px\", padding: \"8px\", fontFamily: \"Nunito\", outline: \"none\" }} />\n              </div>\n              <div className=\"field\">\n                <label>Name</label>\n                <input value={accForm.name} onChange={e => setAccForm(f => ({ ...f, name: e.target.value }))} placeholder=\"Account name\" />\n              </div>\n            </div>\n            <div className=\"field\">\n              <label>Colour</label>\n              <div className=\"color-row\">\n                {COLORS.map(c => <div key={c} className={`color-swatch ${accForm.color === c ? \"selected\" : \"\"}`} style={{ background: c }} onClick={() => setAccForm(f => ({ ...f, color: c }))} />)}\n              </div>\n            </div>\n            <button className=\"btn btn-primary btn-sm\" onClick={addAcc}><Icon name=\"plus\" size={13} /> Add</button>\n          </div>\n          <div className=\"card\">\n            {data.accounts.map(a => (\n              <div key={a.id} style={{ display: \"flex\", alignItems: \"center\", gap: \"12px\", padding: \"8px 0\", borderBottom: \"1px solid var(--border)\" }}>\n                <div style={{ width: \"12px\", height: \"12px\", borderRadius: \"50%\", background: a.color }} />\n                <span style={{ fontSize: \"18px\" }}>{a.icon}</span>\n                <span style={{ flex: 1, fontSize: \"14px\" }}>{a.name}</span>\n                <button className=\"btn-icon\" onClick={() => deleteAcc(a.id)}><Icon name=\"trash\" size={13} /></button>\n              </div>\n            ))}\n          </div>\n        </div>\n      )}\n\n      {tab === \"export\" && (\n        <ExportTab data={data} />\n      )}\n\n      {tab === \"general\" && (\n        <div className=\"card\">\n          <div className=\"field\">\n            <label>Currency symbol</label>\n            <input value={data.currency} onChange={e => setData(d => ({ ...d, currency: e.target.value }))} style={{ width: '70px', background: 'var(--surface2)', color: 'var(--text)', border: '1.5px solid var(--border)', borderRadius: '8px', padding: '8px 10px', fontFamily: 'Nunito', fontSize: '14px', outline: 'none' }} maxLength={3} />\n          </div>\n          <div className=\"section-divider\" />\n          <div style={{ fontSize: \"13px\", color: \"var(--text3)\" }}>\n            <strong style={{ color: \"var(--text)\" }}>Data storage</strong><br />\n            Your data is saved automatically after every change. You never need to manually save.\n          </div>\n          <div className=\"section-divider\" />\n          <div style={{ fontSize: \"13px\", color: \"var(--text2)\", marginBottom: \"8px\" }}>\n            <strong style={{ color: \"var(--text)\" }}>Reset app data</strong><br />\n            If the app is behaving oddly, clearing storage and reloading can fix it. This resets back to the sample data.\n          </div>\n          <button className=\"btn btn-danger\" onClick={async () => {\n            if (window.confirm(\"Reset all data to defaults? This cannot be undone.\")) {\n              await clearStorage();\n              window.location.reload();\n            }\n          }}>Clear storage & reset</button>\n          <div className=\"section-divider\" />\n          <div style={{ fontSize: \"13px\", color: \"var(--text2)\", marginBottom: \"10px\" }}>\n            <strong style={{ color: \"var(--text)\" }}>Tutorial</strong><br />\n            New to bloom or want a refresher? The guided tour covers everything.\n          </div>\n          <button className=\"btn btn-secondary\" onClick={() => setShowTutorial(true)} style={{ marginBottom: \"16px\" }}>\n            Show tutorial\n          </button>\n          <div className=\"section-divider\" />\n          <div style={{ fontSize: \"13px\", color: \"var(--text2)\", marginBottom: \"10px\" }}>\n            <strong style={{ color: \"var(--text)\" }}>Feedback</strong><br />\n            Found a bug? Have a suggestion? I'd genuinely love to hear from you.\n          </div>\n          <a href={\"mailto:\" + getAdminConfig().feedbackEmail + \"?subject=BloomBudget feedback\"}\n            className=\"btn btn-secondary\"\n            style={{ textDecoration: \"none\", display: \"inline-flex\" }}>\n            Send feedback\n          </a>\n        </div>\n      )}\n\n      {tab === \"about\" && (\n        <div>\n          <div className=\"card\" style={{ marginBottom: \"14px\", background: \"linear-gradient(135deg, #2E1020 0%, #1E1A2E 100%)\", border: \"1px solid var(--berry-mid)\" }}>\n            <div style={{ fontSize: \"28px\", fontWeight: 700, color: \"var(--berry)\", fontFamily: \"Nunito\", marginBottom: \"4px\" }}>bloom</div>\n            <div style={{ fontSize: \"13px\", color: \"var(--text3)\", marginBottom: \"16px\", fontStyle: \"italic\" }}>your money, kindly</div>\n            <div style={{ fontSize: \"14px\", color: \"var(--text2)\", lineHeight: 1.7 }}>\n              Hi! I'm the person behind bloom. I have ADHD, and like a lot of people with ADHD, I've had a complicated relationship with money \u2014 not because I don't care, but because most budgeting tools feel designed for a different kind of brain.\n            </div>\n            <div style={{ fontSize: \"14px\", color: \"var(--text2)\", lineHeight: 1.7, marginTop: \"10px\" }}>\n              I built bloom for myself first. Something warm, simple, and honest \u2014 that tracks without judging, and shows you where your money goes without making you feel bad about it. If it helps you too, that genuinely makes me happy.\n            </div>\n            <div style={{ fontSize: \"14px\", color: \"var(--text2)\", lineHeight: 1.7, marginTop: \"10px\" }}>\n              bloom is free and always will be. If it's been useful to you, a small coffee goes a long way toward keeping it running and growing. \u2665\n            </div>\n          </div>\n\n          <a\n            href={getAdminConfig().kofiUrl}\n            target=\"_blank\"\n            rel=\"noopener noreferrer\"\n            style={{ textDecoration: \"none\", display: \"block\", marginBottom: \"12px\" }}\n          >\n            <div style={{\n              background: \"linear-gradient(135deg, #FF6B6B, #FF8E53)\",\n              borderRadius: \"var(--radius)\",\n              padding: \"16px 20px\",\n              display: \"flex\",\n              alignItems: \"center\",\n              gap: \"14px\",\n              cursor: \"pointer\",\n              boxShadow: \"0 4px 20px rgba(255,107,107,0.3)\"\n            }}>\n              <div style={{ fontSize: \"28px\" }}>\u2615</div>\n              <div>\n                <div style={{ fontWeight: 700, fontSize: \"15px\", color: \"white\" }}>Buy me a coffee</div>\n                <div style={{ fontSize: \"12px\", color: \"rgba(255,255,255,0.85)\", marginTop: \"2px\" }}>Support bloom on Ko-fi</div>\n              </div>\n              <div style={{ marginLeft: \"auto\", color: \"rgba(255,255,255,0.7)\", fontSize: \"18px\" }}>\u2192</div>\n            </div>\n          </a>\n\n          <a\n            href={\"mailto:\" + getAdminConfig().feedbackEmail + \"?subject=BloomBudget feedback\"}\n            style={{ textDecoration: \"none\", display: \"block\", marginBottom: \"12px\" }}\n          >\n            <div style={{\n              background: \"var(--surface)\",\n              border: \"1.5px solid var(--border)\",\n              borderRadius: \"var(--radius)\",\n              padding: \"16px 20px\",\n              display: \"flex\",\n              alignItems: \"center\",\n              gap: \"14px\",\n              cursor: \"pointer\"\n            }}>\n              <div style={{ fontSize: \"24px\" }}>\u2709\ufe0f</div>\n              <div>\n                <div style={{ fontWeight: 600, fontSize: \"14px\", color: \"var(--text)\" }}>Share feedback</div>\n                <div style={{ fontSize: \"12px\", color: \"var(--text3)\", marginTop: \"2px\" }}>Bugs, ideas, or just to say hi</div>\n              </div>\n              <div style={{ marginLeft: \"auto\", color: \"var(--text3)\", fontSize: \"18px\" }}>\u2192</div>\n            </div>\n          </a>\n\n          <div style={{ textAlign: \"center\", fontSize: \"12px\", color: \"var(--text3)\", marginTop: \"20px\", lineHeight: 1.6 }}>\n            bloom v1.0 \u00b7 made with care for messy brains everywhere\n          </div>\n        </div>\n      )}\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500 App \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction App() {\n  const [data, setDataRaw] = useState(null);\n  const [page, setPage] = useState(\"dashboard\");\n  const [loaded, setLoaded] = useState(false);\n  const [storageError, setStorageError] = useState(false);\n  const [showTutorial, setShowTutorial] = useState(false);\n  const [showAdmin, setShowAdmin] = useState(false);\n  const [adminTapCount, setAdminTapCount] = useState(0);\n  const [adminTapTimer, setAdminTapTimer] = useState(null);\n\n  useEffect(() => {\n    loadData().then(saved => {\n      if (saved) {\n        setDataRaw(saved);\n      } else {\n        setDataRaw(INITIAL_STATE);\n        setStorageError(false);\n      }\n      setLoaded(true);\n      if (!hasTutorialBeenSeen()) {\n        setTimeout(() => setShowTutorial(true), 600);\n      }\n    }).catch(err => {\n      console.error(\"Load error:\", err);\n      setDataRaw(INITIAL_STATE);\n      setStorageError(true);\n      setLoaded(true);\n    });\n  }, []);\n\n  const setData = (updater) => {\n    setDataRaw(prev => {\n      const next = typeof updater === \"function\" ? updater(prev) : updater;\n      saveData(next);\n      return next;\n    });\n  };\n\n  if (!loaded) return (\n    <div style={{ height: \"100vh\", display: \"flex\", alignItems: \"center\", justifyContent: \"center\", fontFamily: \"Lora, serif\", color: \"#C4697A\", fontSize: \"24px\", background: \"#FBF6F0\" }}>\n       Loading your budget...\n    </div>\n  );\n\n  const nav = [\n    { id: \"dashboard\", label: \"Dashboard\", icon: \"home\",     color: \"#F08898\", bg: \"#4A1828\" },\n    { id: \"expenses\",  label: \"Expenses\",  icon: \"wallet\",   color: \"#F0A870\", bg: \"#40200A\" },\n    { id: \"budgets\",   label: \"Budgets\",   icon: \"chart\",    color: \"#70D098\", bg: \"#0E3020\" },\n    { id: \"stats\",     label: \"Statistics\",icon: \"brain\",    color: \"#70B8E0\", bg: \"#0E2838\" },\n    { id: \"analysis\",  label: \"Analysis\",  icon: \"sparkle\",  color: \"#E888A8\", bg: \"#481020\" },\n    { id: \"calendar\",  label: \"Calendar\",  icon: \"calendar\", color: \"#E89870\", bg: \"#401808\" },\n    { id: \"notes\",     label: \"Notes\",     icon: \"note\",     color: \"#E8C860\", bg: \"#382005\" },\n    { id: \"settings\",  label: \"Settings\",  icon: \"settings\", color: \"#B09898\", bg: \"#302020\" },\n  ];\n\n  const pages = { dashboard: Dashboard, expenses: ExpensesPage, budgets: BudgetsPage, stats: StatsPage, analysis: AnalysisPage, calendar: CalendarPage, notes: NotesPage, settings: SettingsPage };\n  const extraProps = page === \"settings\" ? { onShowTutorial: () => setShowTutorial(true) } : {};\n  const PageComponent = pages[page] || Dashboard;\n\n  return (\n    <>\n      <style>{styles}</style>\n      <div className=\"app\">\n        {storageError && (\n          <div style={{ position: \"fixed\", top: 0, left: 0, right: 0, background: \"var(--berry)\", color: \"white\", padding: \"10px 16px\", fontSize: \"13px\", zIndex: 200, display: \"flex\", justifyContent: \"space-between\", alignItems: \"center\" }}>\n            <span>Storage issue detected \u2014 showing default data. Go to Settings \u2192 Reset to clear.</span>\n            <button onClick={() => setStorageError(false)} style={{ background: \"none\", border: \"none\", color: \"white\", cursor: \"pointer\", fontSize: \"16px\" }}>\u00d7</button>\n          </div>\n        )}\n        <nav className=\"sidebar\">\n          <div className=\"sidebar-logo\">\n            bloom<span>your money, kindly</span>\n          </div>\n          {nav.map(n => {\n            const isActive = page === n.id;\n            return (\n              <button key={n.id}\n                className={`nav-btn ${isActive ? \"active\" : \"\"}`}\n                onClick={() => setPage(n.id)}\n                style={isActive ? { color: n.color, background: n.bg + \"88\" } : {}}\n              >\n                <span className=\"nav-icon-pill\" style={{\n                  background: n.bg,\n                  color: n.color,\n                  opacity: isActive ? 1 : 0.65,\n                  transform: isActive ? \"scale(1.1)\" : \"scale(1)\",\n                  boxShadow: isActive ? `0 2px 8px ${n.color}40` : \"none\"\n                }}>\n                  <Icon name={n.icon} size={15} />\n                </span>\n                <span style={{ opacity: isActive ? 1 : 0.75 }}>{n.label}</span>\n              </button>\n            );\n          })}\n        </nav>\n        <main className=\"main\">\n          <PageComponent data={data} setData={setData} {...extraProps} />\n          <div style={{\n            textAlign: \"center\", padding: \"24px 16px 12px\",\n            fontSize: \"11px\", color: \"var(--text3)\",\n            display: \"flex\", alignItems: \"center\", justifyContent: \"center\", gap: \"14px\", flexWrap: \"wrap\"\n          }}>\n            <span\n              onClick={() => {\n                const newCount = adminTapCount + 1;\n                setAdminTapCount(newCount);\n                if (adminTapTimer) clearTimeout(adminTapTimer);\n                const t = setTimeout(() => setAdminTapCount(0), 2000);\n                setAdminTapTimer(t);\n                if (newCount >= 5) { setAdminTapCount(0); setShowAdmin(true); }\n              }}\n              style={{ cursor: \"default\", userSelect: \"none\" }}\n            >bloom \u00b7 your money, kindly</span>\n            <a href={getAdminConfig().kofiUrl} target=\"_blank\" rel=\"noopener noreferrer\"\n              style={{ color: \"var(--berry)\", textDecoration: \"none\", fontWeight: 600, fontSize: \"11px\" }}>\n              \u2615 buy me a coffee\n            </a>\n            <a href={\"mailto:\" + getAdminConfig().feedbackEmail + \"?subject=BloomBudget feedback\"}\n              style={{ color: \"var(--text3)\", textDecoration: \"none\" }}>\n              feedback\n            </a>\n          </div>\n        </main>\n\n        {showTutorial && <TutorialModal onClose={() => { markTutorialSeen(); setShowTutorial(false); }} />}\n        {showAdmin && <AdminPanel onClose={() => setShowAdmin(false)} />}\n\n        {/* Mobile bottom tab bar */}\n        <nav className=\"bottom-nav\">\n          {nav.map(n => {\n            const isActive = page === n.id;\n            return (\n              <button key={n.id}\n                className={`bottom-nav-btn ${isActive ? \"active\" : \"\"}`}\n                onClick={() => setPage(n.id)}\n              >\n                <span className=\"bottom-nav-pill\" style={{\n                  background: n.bg,\n                  color: n.color,\n                  opacity: isActive ? 1 : 0.5,\n                  boxShadow: isActive ? `0 3px 10px ${n.color}50` : \"none\",\n                }}>\n                  <Icon name={n.icon} size={16} />\n                </span>\n                <span className=\"bottom-nav-label\" style={{\n                  color: isActive ? n.color : \"var(--text3)\",\n                  opacity: isActive ? 1 : 0.7,\n                }}>\n                  {n.label}\n                </span>\n              </button>\n            );\n          })}\n        </nav>\n      </div>\n    </>\n  );\n}\n\nconst root = ReactDOM.createRoot(document.getElementById('root'));\nroot.render(React.createElement(App));\n";
    var s = document.createElement('script');
