  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script>
    var APP_SOURCE = "\n// \u2500\u2500\u2500 Persistent Storage Helpers \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst STORAGE_KEY = \"bloom_budget_v1\";\nconst TUTORIAL_KEY = \"bloom_tutorial_seen_v1\";\nconst ADMIN_KEY = \"bloom_admin_config_v1\";\n\nconst getAdminConfig = () => {\n  try {\n    const r = localStorage.getItem(ADMIN_KEY);\n    if (r) return JSON.parse(r);\n  } catch(e) {}\n  return { kofiUrl: \"https://ko-fi.com/YOUR_KOFI_USERNAME\", feedbackEmail: \"YOUR_EMAIL@example.com\" };\n};\n\nconst saveAdminConfig = (cfg) => {\n  try { localStorage.setItem(ADMIN_KEY, JSON.stringify(cfg)); } catch(e) {}\n};\nconst hasTutorialBeenSeen = () => { try { return !!localStorage.getItem(TUTORIAL_KEY); } catch(e) { return false; } };\nconst markTutorialSeen = () => { try { localStorage.setItem(TUTORIAL_KEY, \"1\"); } catch(e) {} };\n\nconst saveData = async (data) => {\n  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}\n};\n\nconst loadData = async () => {\n  try { const r = localStorage.getItem(STORAGE_KEY); if (r) { const p = JSON.parse(r); if (p && Array.isArray(p.expenses)) return p; } } catch(e) {}\n  return null;\n};\n\nconst clearStorage = async () => { try { localStorage.removeItem(STORAGE_KEY); } catch(e) {} };\n\n// \u2500\u2500\u2500 Default Data \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst DEFAULT_CATEGORIES = [\n  { id: \"c1\", name: \"Food & Groceries\", color: \"#E8936A\", icon: \"\ud83d\uded2\" },\n  { id: \"c2\", name: \"Pet Food\", color: \"#A8C5A0\", icon: \"\ud83d\udc3e\" },\n  { id: \"c3\", name: \"Transport\", color: \"#7BA7BC\", icon: \"\ud83d\ude8c\" },\n  { id: \"c4\", name: \"Subscriptions\", color: \"#C4A0C8\", icon: \"\ud83d\udcf1\" },\n  { id: \"c5\", name: \"Health\", color: \"#E88F8F\", icon: \"\ud83d\udc8a\" },\n  { id: \"c6\", name: \"Entertainment\", color: \"#F0C87A\", icon: \"\ud83c\udfb5\" },\n  { id: \"c7\", name: \"Home\", color: \"#B8A89A\", icon: \"\ud83c\udfe0\" },\n  { id: \"c8\", name: \"Clothing\", color: \"#D4A0B0\", icon: \"\ud83d\udc57\" },\n  { id: \"c9\", name: \"Other\", color: \"#9CA8B0\", icon: \"\u2728\" },\n];\n\nconst DEFAULT_ACCOUNTS = [\n  { id: \"a1\", name: \"Main account\", color: \"#E8936A\", icon: \"\ud83c\udfe6\" },\n  { id: \"a2\", name: \"PayPal\", color: \"#7BA7BC\", icon: \"\ud83d\udc99\" },\n  { id: \"a3\", name: \"Cash\", color: \"#A8C5A0\", icon: \"\ud83d\udcb6\" },\n];\n\nconst DEFAULT_BUDGETS = [\n  { id: \"b1\", categoryId: \"c1\", amount: 300, period: \"monthly\" },\n  { id: \"b2\", categoryId: \"c2\", amount: 150, period: \"monthly\" },\n];\n\nconst INITIAL_STATE = {\n  expenses: [\n    {\n      id: \"e1\", name: \"Pet food subscription\", categoryId: \"c2\", accountId: \"a1\",\n      amount: 45, currency: \"\u20ac\", type: \"Lastschrift\", date: \"2025-03-25\",\n      recurring: true, recurringDay: 25, recurringPeriod: \"monthly\",\n      tags: [\"Pets\"], note: \"Check stock before ordering\"\n    },\n    {\n      id: \"e2\", name: \"Spotify\", categoryId: \"c4\", accountId: \"a1\",\n      amount: 10.99, currency: \"\u20ac\", type: \"Lastschrift\", date: \"2025-03-01\",\n      recurring: true, recurringDay: 1, recurringPeriod: \"monthly\",\n      tags: [], note: \"\"\n    },\n    {\n      id: \"e3\", name: \"Weekly groceries\", categoryId: \"c1\", accountId: \"a3\",\n      amount: 62.40, currency: \"\u20ac\", type: \"Bar\", date: \"2025-03-20\",\n      recurring: false, recurringDay: null, recurringPeriod: null,\n      tags: [], note: \"\"\n    },\n  ],\n  categories: DEFAULT_CATEGORIES,\n  accounts: DEFAULT_ACCOUNTS,\n  budgets: DEFAULT_BUDGETS,\n  notes: [\n    { id: \"n1\", text: \"Check your upcoming recurring payments at the start of the month\", date: \"2025-03-25\", pinned: true },\n  ],\n  currency: \"\u20ac\",\n};\n\n// \u2500\u2500\u2500 Utils \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst uid = () => Math.random().toString(36).slice(2, 9);\nconst fmt = (n) => new Intl.NumberFormat(\"de-DE\", { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);\nconst currentMonth = () => new Date().toISOString().slice(0, 7);\nconst monthLabel = (ym) => { const [y, m] = ym.split(\"-\"); return new Date(y, m - 1).toLocaleString(\"default\", { month: \"long\", year: \"numeric\" }); };\n\n// \u2500\u2500\u2500 Icons \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst Icon = ({ name, size = 18 }) => {\n  const icons = {\n    home: \"M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6\",\n    plus: \"M12 4v16m8-8H4\",\n    chart: \"M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z\",\n    calendar: \"M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z\",\n    settings: \"M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z\",\n    brain: \"M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z\",\n    tag: \"M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z\",\n    note: \"M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z\",\n    trash: \"M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16\",\n    edit: \"M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z\",\n    x: \"M6 18L18 6M6 6l12 12\",\n    check: \"M5 13l4 4L19 7\",\n    chevronDown: \"M19 9l-7 7-7-7\",\n    repeat: \"M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15\",\n    wallet: \"M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z\",\n    sparkle: \"M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z\",\n  };\n  return (\n    <svg width={size} height={size} viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokeWidth=\"1.8\" strokeLinecap=\"round\" strokeLinejoin=\"round\">\n      {(icons[name] || \"\").split(\" M\").map((d, i) => <path key={i} d={i === 0 ? d : \"M\" + d} />)}\n    </svg>\n  );\n};\n\n// \u2500\u2500\u2500 Styles \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst styles = `\n  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&display=swap');\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  :root {\n    --bg: #1A1118;\n    --surface: #261820;\n    --surface2: #2E1E28;\n    --border: #3E2838;\n    --text: #F5EEF0;\n    --text2: #C8A8B4;\n    --text3: #8A6878;\n    --berry: #E8809A;\n    --berry-light: #3D1E2C;\n    --berry-mid: #C4607A;\n    --sage: #7EC8A0;\n    --sage-light: #1A3028;\n    --warm: #F0A878;\n    --warm-light: #38200E;\n    --gold: #E8C070;\n    --gold-light: #302008;\n    --radius: 16px;\n    --radius-sm: 10px;\n    --shadow: 0 2px 20px rgba(0,0,0,0.40);\n    --shadow-lg: 0 8px 40px rgba(0,0,0,0.55);\n  }\n\n  body { background: var(--bg); font-family: 'Nunito', sans-serif; color: var(--text); }\n\n  .app { display: flex; height: 100vh; overflow: hidden; }\n\n  /* Sidebar */\n  .sidebar {\n    width: 220px; min-width: 220px; background: var(--surface);\n    border-right: 1px solid var(--border); display: flex; flex-direction: column;\n    padding: 24px 16px; gap: 4px; overflow-y: auto;\n    background: linear-gradient(180deg, #2E1C28 0%, #1A1118 100%);\n  }\n  .sidebar-logo { font-family: 'Nunito', sans-serif; font-weight: 600; font-size: 22px; color: var(--berry); margin-bottom: 24px; padding: 0 8px; }\n  .sidebar-logo span { color: var(--text3); font-size: 13px; font-family: 'Nunito'; font-weight: 300; display: block; margin-top: 2px; }\n  .nav-btn {\n    display: flex; align-items: center; gap: 10px; padding: 11px 10px;\n    border-radius: var(--radius-sm); border: none; background: none; cursor: pointer;\n    font-family: 'Nunito'; font-size: 14px; color: var(--text2); text-align: left;\n    transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1); width: 100%;\n    transform-origin: left center;\n  }\n  .nav-btn:hover { background: var(--surface2); color: var(--text); }\n  .nav-btn.active { font-weight: 700; transform: scale(1.04); background: rgba(255,255,255,0.06); }\n  .nav-btn.active { font-weight: 700; transform: scale(1.04); }\n  .nav-icon-pill {\n    width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center;\n    justify-content: center; flex-shrink: 0; transition: all 0.18s;\n  }\n  .nav-section { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; padding: 16px 12px 4px; }\n\n  /* Main */\n  .main { flex: 1; overflow-y: auto; background: var(--bg); background-image: radial-gradient(ellipse at 15% 0%, #2E1020 0%, transparent 55%), radial-gradient(ellipse at 85% 100%, #0E2820 0%, transparent 55%); }\n  .page { padding: 32px; max-width: 960px; }\n  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }\n  .page-title { font-family: 'Nunito', sans-serif; font-weight: 600; font-size: 28px; color: var(--text); }\n  .page-subtitle { font-size: 14px; color: var(--text3); margin-top: 2px; }\n\n  /* Cards */\n  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; }\n  .card-sm { background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 16px; }\n\n  /* Buttons */\n  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 100px; border: none; cursor: pointer; font-family: 'Nunito'; font-size: 13px; font-weight: 500; transition: all 0.15s; }\n  .btn-primary { background: var(--berry); color: white; }\n  .btn-primary:hover { background: #B55A6A; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(196,105,122,0.3); }\n  .btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }\n  .btn-secondary:hover { background: var(--border); }\n  .btn-ghost { background: none; color: var(--text2); }\n  .btn-ghost:hover { background: var(--surface2); }\n  .btn-danger { background: #FDE8E8; color: #C45A5A; }\n  .btn-danger:hover { background: #F8D0D0; }\n  .btn-sm { padding: 6px 12px; font-size: 12px; }\n  .btn-icon { padding: 7px; border-radius: 8px; background: none; border: none; cursor: pointer; color: var(--text3); transition: all 0.15s; display: inline-flex; }\n  .btn-icon:hover { background: var(--surface2); color: var(--text); }\n\n  /* Stat cards */\n  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }\n  .stat-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 18px 20px; }\n  .stat-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }\n  .stat-value { font-family: 'Nunito', sans-serif; font-weight: 600; font-size: 26px; color: var(--text); margin: 4px 0 2px; }\n  .stat-sub { font-size: 12px; color: var(--text3); }\n  .stat-card.berry { border-left: 3px solid var(--berry); }\n  .stat-card.sage { border-left: 3px solid var(--sage); }\n  .stat-card.warm { border-left: 3px solid var(--warm); }\n  .stat-card.gold { border-left: 3px solid var(--gold); }\n\n  /* Expense list */\n  .expense-item {\n    display: flex; align-items: center; gap: 14px; padding: 14px 16px;\n    border-radius: var(--radius-sm); background: var(--surface);\n    border: 1px solid var(--border); margin-bottom: 8px; transition: all 0.15s;\n  }\n  .expense-item:hover { border-color: var(--berry-mid); box-shadow: var(--shadow); }\n  .expense-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }\n  .expense-name { font-size: 14px; font-weight: 500; color: var(--text); }\n  .expense-meta { font-size: 12px; color: var(--text3); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }\n  .expense-amount { font-family: 'Nunito', sans-serif; font-weight: 600; font-size: 17px; color: var(--text); margin-left: auto; white-space: nowrap; }\n  .expense-amount.recurring { color: var(--berry); }\n  .tag-chip { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 100px; background: var(--gold-light); color: var(--gold); font-size: 11px; font-weight: 500; }\n  .tag-chip.sage { background: var(--sage-light); color: var(--sage); }\n  .type-chip { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 100px; background: var(--border); color: var(--text2); font-size: 11px; }\n\n  /* Form */\n  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }\n  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }\n  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }\n  .field label { font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }\n  .field input, .field select, .field textarea {\n    padding: 10px 13px; border-radius: var(--radius-sm); border: 1.5px solid var(--border);\n    background: var(--surface2); font-family: 'Nunito'; font-size: 14px; color: var(--text);\n    transition: all 0.15s; outline: none;\n  }\n  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--berry-mid); box-shadow: 0 0 0 3px var(--berry-light); }\n  .field textarea { resize: vertical; min-height: 70px; }\n  .field-hint { font-size: 11px; color: var(--text3); }\n\n  /* Modal */\n  .modal-overlay { position: fixed; inset: 0; background: rgba(58,46,38,0.35); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; backdrop-filter: blur(2px); }\n  .modal { background: var(--surface); border-radius: 20px; padding: 28px; max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }\n  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }\n  .modal-title { font-family: 'Nunito', sans-serif; font-weight: 600; font-size: 20px; }\n\n  /* Budget bar */\n  .budget-bar-wrap { margin: 8px 0 4px; }\n  .budget-bar-bg { height: 8px; border-radius: 100px; background: var(--border); overflow: hidden; }\n  .budget-bar-fill { height: 100%; border-radius: 100px; transition: width 0.6s ease; }\n\n  /* Calendar */\n  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }\n  .cal-header-cell { text-align: center; font-size: 11px; color: var(--text3); padding: 6px 2px; text-transform: uppercase; letter-spacing: 0.05em; }\n  .cal-day {\n    height: 44px; display: flex; flex-direction: column; align-items: center; justify-content: center;\n    border-radius: 8px; font-size: 13px; cursor: default; gap: 2px; min-width: 0;\n  }\n  .cal-day.today { background: var(--berry-light); color: var(--berry); font-weight: 600; }\n  .cal-day.has-event { background: var(--warm-light); }\n  .cal-day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--warm); flex-shrink: 0; }\n  .cal-day.empty { opacity: 0; pointer-events: none; }\n\n  /* Tabs */\n  .tabs { display: flex; gap: 4px; padding: 4px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); width: fit-content; margin-bottom: 20px; }\n  .tab { padding: 7px 16px; border-radius: 8px; border: none; background: none; font-family: 'Nunito'; font-size: 13px; cursor: pointer; color: var(--text3); transition: all 0.15s; }\n  .tab.active { background: var(--surface2); color: var(--text); box-shadow: 0 1px 6px rgba(0,0,0,0.3); font-weight: 600; }\n\n  /* Analysis */\n  .analysis-card { background: linear-gradient(135deg, #3A1020 0%, #261820 100%); border: 1px solid var(--berry-mid); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }\n  .analysis-title { font-family: 'Nunito', sans-serif; font-weight: 600; font-size: 16px; color: var(--berry); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }\n  .insight-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--berry-light); }\n  .insight-item:last-child { border-bottom: none; }\n  .insight-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }\n  .insight-text { font-size: 13px; color: var(--text2); line-height: 1.5; }\n  .insight-text strong { color: var(--text); }\n\n  /* Color picker row */\n  .color-swatch { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; flex-shrink: 0; }\n  .color-swatch.selected { border-color: var(--text); transform: scale(1.15); }\n  .color-row { display: flex; gap: 8px; flex-wrap: wrap; }\n\n  /* Notes */\n  .note-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 10px; }\n  .note-card.pinned { border-left: 3px solid var(--gold); background: #28180A; }\n\n  /* Scrollbar */\n  ::-webkit-scrollbar { width: 4px; }\n  ::-webkit-scrollbar-track { background: transparent; }\n  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 100px; }\n\n  /* Force dark theme on all inline pill inputs and selects */\n  input[type=\"month\"], input[type=\"date\"] {\n    background: var(--surface2) !important;\n    color: var(--text) !important;\n    border-color: var(--border) !important;\n    color-scheme: dark;\n  }\n  input[type=\"text\"], input[type=\"number\"], input[type=\"search\"] {\n    background: var(--surface2) !important;\n    color: var(--text) !important;\n    border-color: var(--border) !important;\n  }\n  select {\n    background: var(--surface2) !important;\n    color: var(--text) !important;\n    border-color: var(--border) !important;\n  }\n  input::placeholder { color: var(--text3) !important; }\n\n  /* Mobile: bottom tab bar */\n  @media (max-width: 680px) {\n    .sidebar { display: none; }\n    .main { padding-bottom: 80px; }\n    .form-row, .form-row-3 { grid-template-columns: 1fr; }\n    .page { padding: 16px; }\n  }\n  @media (min-width: 681px) {\n    .bottom-nav { display: none; }\n  }\n\n  /* Bottom nav bar */\n  .bottom-nav {\n    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;\n    background: rgba(28, 14, 22, 0.95); border-top: 1px solid var(--border);\n    display: flex; align-items: stretch;\n    padding: 6px 4px calc(6px + env(safe-area-inset-bottom));\n    gap: 2px; backdrop-filter: blur(16px);\n  }\n  .bottom-nav-btn {\n    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;\n    gap: 4px; padding: 6px 2px; border: none; background: none; cursor: pointer;\n    border-radius: 10px; transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);\n    min-height: 54px;\n  }\n  .bottom-nav-btn.active { transform: translateY(-3px) scale(1.08); }\n  .bottom-nav-pill {\n    width: 36px; height: 36px; border-radius: 10px;\n    display: flex; align-items: center; justify-content: center;\n    transition: all 0.18s; flex-shrink: 0;\n  }\n  .bottom-nav-label {\n    font-size: 10px; font-family: 'Nunito'; font-weight: 600;\n    letter-spacing: 0.01em; line-height: 1;\n  }\n\n  /* Empty state */\n  .empty { text-align: center; padding: 40px 20px; color: var(--text3); }\n  .empty-icon { font-size: 40px; margin-bottom: 10px; }\n  .empty-text { font-size: 14px; }\n\n  /* Recurring badge */\n  .rec-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px; border-radius: 100px; background: var(--berry-light); color: var(--berry); font-size: 10px; font-weight: 600; }\n\n  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }\n  @media(max-width:700px) { .grid-2 { grid-template-columns: 1fr; } }\n\n  select option { background: #2A2440; color: #F0EBF8; }\n  .section-divider { height: 1px; background: var(--border); margin: 20px 0; }\n  .pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 100px; font-size: 12px; font-weight: 500; }\n`;\n\n// \u2500\u2500\u2500 Color palette \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst COLORS = [\"#C4697A\",\"#E8936A\",\"#D4A060\",\"#A8C5A0\",\"#7A9E87\",\"#7BA7BC\",\"#8A8AC0\",\"#C4A0C8\",\"#E88F8F\",\"#9CA8B0\",\"#B8A89A\",\"#D4A0B0\"];\n\n// \u2500\u2500\u2500 Modals \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction Modal({ title, onClose, children }) {\n  return (\n    <div className=\"modal-overlay\" onClick={e => e.target === e.currentTarget && onClose()}>\n      <div className=\"modal\">\n        <div className=\"modal-header\">\n          <div className=\"modal-title\">{title}</div>\n          <button className=\"btn-icon\" onClick={onClose}><Icon name=\"x\" /></button>\n        </div>\n        {children}\n      </div>\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500 Expense Form \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction ExpenseForm({ categories, accounts, onSave, onClose, initial }) {\n  const [form, setForm] = useState(initial || {\n    name: \"\", categoryId: categories[0]?.id || \"\", accountId: accounts[0]?.id || \"\",\n    amount: \"\", currency: \"\u20ac\", type: \"Lastschrift\", date: new Date().toISOString().slice(0, 10),\n    recurring: false, recurringDay: \"\", recurringPeriod: \"monthly\", tags: [], note: \"\"\n  });\n  const [tagInput, setTagInput] = useState(\"\");\n\n  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));\n  const addTag = () => { if (tagInput.trim() && !form.tags.includes(tagInput.trim())) { set(\"tags\", [...form.tags, tagInput.trim()]); setTagInput(\"\"); } };\n  const removeTag = (t) => set(\"tags\", form.tags.filter(x => x !== t));\n\n  return (\n    <div>\n      <div className=\"form-row\">\n        <div className=\"field\" style={{ gridColumn: \"1/-1\" }}>\n          <label>Name</label>\n          <input value={form.name} onChange={e => set(\"name\", e.target.value)} placeholder=\"e.g. Monthly gym membership\" />\n        </div>\n      </div>\n      <div className=\"form-row\">\n        <div className=\"field\">\n          <label>Amount</label>\n          <input type=\"number\" step=\"0.01\" value={form.amount} onChange={e => set(\"amount\", e.target.value)} placeholder=\"0.00\" />\n        </div>\n        <div className=\"field\">\n          <label>Account</label>\n          <select value={form.accountId} onChange={e => set(\"accountId\", e.target.value)}>\n            {accounts.map(a => <option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}\n          </select>\n        </div>\n      </div>\n      <div className=\"form-row\">\n        <div className=\"field\">\n          <label>Category</label>\n          <select value={form.categoryId} onChange={e => set(\"categoryId\", e.target.value)}>\n            {categories.map(c => <option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}\n          </select>\n        </div>\n        <div className=\"field\">\n          <label>Type</label>\n          <select value={form.type} onChange={e => set(\"type\", e.target.value)}>\n            {[\"Lastschrift\",\"\u00dcberweisung\",\"Bar\",\"Karte\",\"PayPal\",\"Sonstige\"].map(t => <option key={t}>{t}</option>)}\n          </select>\n        </div>\n      </div>\n      <div className=\"form-row\">\n        <div className=\"field\">\n          <label>Date</label>\n          <input type=\"date\" value={form.date} onChange={e => set(\"date\", e.target.value)} />\n        </div>\n        <div className=\"field\">\n          <label style={{ display: \"flex\", alignItems: \"center\", gap: \"8px\" }}>\n            <input type=\"checkbox\" checked={form.recurring} onChange={e => set(\"recurring\", e.target.checked)} />\n            Recurring payment\n          </label>\n          {form.recurring && (\n            <div style={{ display: \"flex\", gap: \"8px\" }}>\n              <input type=\"number\" placeholder=\"Day (1-31)\" min=\"1\" max=\"31\" value={form.recurringDay} onChange={e => set(\"recurringDay\", e.target.value)} style={{ width: \"100px\", padding: \"8px 10px\", borderRadius: \"8px\", border: \"1.5px solid var(--border)\", fontFamily: \"Nunito\", fontSize: \"13px\" }} />\n              <select value={form.recurringPeriod} onChange={e => set(\"recurringPeriod\", e.target.value)} style={{ flex: 1, padding: \"8px 10px\", borderRadius: \"8px\", border: \"1.5px solid var(--border)\", fontFamily: \"Nunito\", fontSize: \"13px\" }}>\n                <option value=\"monthly\">Monthly</option>\n                <option value=\"weekly\">Weekly</option>\n                <option value=\"yearly\">Yearly</option>\n              </select>\n            </div>\n          )}\n        </div>\n      </div>\n      <div className=\"field\">\n        <label>Tags</label>\n        <div style={{ display: \"flex\", gap: \"6px\", flexWrap: \"wrap\", marginBottom: \"6px\" }}>\n          {form.tags.map(t => (\n            <span key={t} className=\"tag-chip\" style={{ cursor: \"pointer\" }} onClick={() => removeTag(t)}>{t} \u00d7</span>\n          ))}\n        </div>\n        <div style={{ display: \"flex\", gap: \"6px\" }}>\n          <input value={tagInput} onChange={e => setTagInput(e.target.value)} onKeyDown={e => e.key === \"Enter\" && addTag()} placeholder=\"Add tag (Enter to confirm)\" style={{ flex: 1, padding: \"8px 12px\", borderRadius: \"8px\", border: \"1.5px solid var(--border)\", fontFamily: \"Nunito\", fontSize: \"13px\" }} />\n          <button className=\"btn btn-secondary btn-sm\" onClick={addTag}>Add</button>\n        </div>\n        <div className=\"field-hint\">Tags let you group expenses across categories (e.g. \"Pets\" for all pet-related costs)</div>\n      </div>\n      <div className=\"field\">\n        <label>Note</label>\n        <textarea value={form.note} onChange={e => set(\"note\", e.target.value)} placeholder=\"Add a reminder or note...\" />\n      </div>\n      <div style={{ display: \"flex\", gap: \"10px\", justifyContent: \"flex-end\", marginTop: \"4px\" }}>\n        <button className=\"btn btn-secondary\" onClick={onClose}>Cancel</button>\n        <button className=\"btn btn-primary\" onClick={() => onSave({ ...form, amount: parseFloat(form.amount) || 0, id: form.id || uid() })}>\n          {initial ? \"Save Changes\" : \"Add Expense\"}\n        </button>\n      </div>\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500 Dashboard \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction Dashboard({ data, setData }) {\n  const now = new Date();\n  const ym = currentMonth();\n\n  const monthExpenses = data.expenses.filter(e => e.date?.startsWith(ym));\n  const totalMonth = monthExpenses.reduce((s, e) => s + e.amount, 0);\n  const recurringTotal = data.expenses.filter(e => e.recurring).reduce((s, e) => s + e.amount, 0);\n  const allTags = [...new Set(data.expenses.flatMap(e => e.tags))];\n\n  const catSpend = {};\n  monthExpenses.forEach(e => { catSpend[e.categoryId] = (catSpend[e.categoryId] || 0) + e.amount; });\n  const topCat = Object.entries(catSpend).sort((a, b) => b[1] - a[1]).slice(0, 5);\n\n  const recentExpenses = [...data.expenses].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);\n\n  const getCat = id => data.categories.find(c => c.id === id);\n  const getAcc = id => data.accounts.find(a => a.id === id);\n\n  return (\n    <div className=\"page\">\n      <div className=\"page-header\">\n        <div>\n          <div className=\"page-title\">Good day</div>\n          <div className=\"page-subtitle\">{now.toLocaleDateString(\"de-DE\", { weekday: \"long\", day: \"numeric\", month: \"long\", year: \"numeric\" })}</div>\n        </div>\n      </div>\n\n      <div className=\"stats-grid\">\n        <div className=\"stat-card berry\">\n          <div className=\"stat-label\">This month</div>\n          <div className=\"stat-value\">{data.currency}{fmt(totalMonth)}</div>\n          <div className=\"stat-sub\">{monthExpenses.length} transactions</div>\n        </div>\n        <div className=\"stat-card sage\">\n          <div className=\"stat-label\">Monthly recurring</div>\n          <div className=\"stat-value\">{data.currency}{fmt(recurringTotal)}</div>\n          <div className=\"stat-sub\">{data.expenses.filter(e => e.recurring).length} subscriptions</div>\n        </div>\n        <div className=\"stat-card warm\">\n          <div className=\"stat-label\">Tracked tags</div>\n          <div className=\"stat-value\">{allTags.length}</div>\n          <div className=\"stat-sub\">{allTags.slice(0, 2).join(\", \") || \"None yet\"}</div>\n        </div>\n        <div className=\"stat-card gold\">\n          <div className=\"stat-label\">Accounts</div>\n          <div className=\"stat-value\">{data.accounts.length}</div>\n          <div className=\"stat-sub\">{data.accounts.map(a => a.name).join(\", \")}</div>\n        </div>\n      </div>\n\n      <div className=\"grid-2\">\n        <div className=\"card\">\n          <div style={{ fontFamily: \"Nunito\", fontSize: \"16px\", marginBottom: \"14px\", color: \"var(--text)\" }}>Top categories this month</div>\n          {topCat.length === 0 ? <div className=\"empty\"><div className=\"empty-text\">No expenses this month yet</div></div> : topCat.map(([catId, amt]) => {\n            const cat = getCat(catId);\n            const pct = Math.min(100, (amt / totalMonth) * 100);\n            return (\n              <div key={catId} style={{ marginBottom: \"12px\" }}>\n                <div style={{ display: \"flex\", justifyContent: \"space-between\", fontSize: \"13px\", marginBottom: \"4px\" }}>\n                  <span style={{ display: \"flex\", alignItems: \"center\", gap: \"6px\" }}>\n                    <span style={{ width: \"8px\", height: \"8px\", borderRadius: \"50%\", background: cat?.color, display: \"inline-block\" }} />\n                    {cat?.icon} {cat?.name}\n                  </span>\n                  <span style={{ fontFamily: \"Nunito\", fontWeight: 500 }}>{data.currency}{fmt(amt)}</span>\n                </div>\n                <div className=\"budget-bar-bg\">\n                  <div className=\"budget-bar-fill\" style={{ width: pct + \"%\", background: cat?.color }} />\n                </div>\n              </div>\n            );\n          })}\n        </div>\n\n        <div className=\"card\">\n          <div style={{ fontFamily: \"Nunito\", fontSize: \"16px\", marginBottom: \"14px\" }}>Recent transactions</div>\n          {recentExpenses.length === 0 ? (\n            <div className=\"empty\"><div className=\"empty-text\">No expenses yet</div></div>\n          ) : recentExpenses.map(e => {\n            const cat = getCat(e.categoryId);\n            return (\n              <div key={e.id} style={{ display: \"flex\", alignItems: \"center\", gap: \"10px\", padding: \"8px 0\", borderBottom: \"1px solid var(--border)\" }}>\n                <div className=\"expense-dot\" style={{ background: cat?.color }} />\n                <div style={{ flex: 1 }}>\n                  <div style={{ fontSize: \"13px\", fontWeight: 500 }}>{e.name}</div>\n                  <div style={{ fontSize: \"11px\", color: \"var(--text3)\" }}>{cat?.name} \u00b7 {e.date}</div>\n                </div>\n                <div style={{ fontFamily: \"Nunito\", fontSize: \"15px\" }}>{data.currency}{fmt(e.amount)}</div>\n              </div>\n            );\n          })}\n        </div>\n      </div>\n\n      {/* Budget summary */}\n      {data.budgets.length > 0 && (\n        <div className=\"card\" style={{ marginTop: \"16px\" }}>\n          <div style={{ fontFamily: \"Nunito\", fontSize: \"16px\", marginBottom: \"14px\" }}>Budget snapshot</div>\n          <div style={{ display: \"grid\", gridTemplateColumns: \"repeat(auto-fill, minmax(200px, 1fr))\", gap: \"14px\" }}>\n            {data.budgets.map(b => {\n              const cat = getCat(b.categoryId);\n              const spent = monthExpenses.filter(e => e.categoryId === b.categoryId).reduce((s, e) => s + e.amount, 0);\n              const pct = Math.min(100, (spent / b.amount) * 100);\n              const over = spent > b.amount;\n              return (\n                <div key={b.id} className=\"card-sm\">\n                  <div style={{ display: \"flex\", justifyContent: \"space-between\", marginBottom: \"8px\", fontSize: \"13px\" }}>\n                    <span>{cat?.icon} {cat?.name}</span>\n                    <span style={{ color: over ? \"var(--berry)\" : \"var(--sage)\", fontWeight: 500 }}>{Math.round(pct)}%</span>\n                  </div>\n                  <div className=\"budget-bar-bg\">\n                    <div className=\"budget-bar-fill\" style={{ width: pct + \"%\", background: over ? \"var(--berry)\" : cat?.color }} />\n                  </div>\n                  <div style={{ fontSize: \"11px\", color: \"var(--text3)\", marginTop: \"4px\" }}>{data.currency}{fmt(spent)} of {data.currency}{fmt(b.amount)}</div>\n                </div>\n              );\n            })}\n          </div>\n        </div>\n      )}\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500 Expenses Page \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction ExpensesPage({ data, setData }) {\n  const [showForm, setShowForm] = useState(false);\n  const [editing, setEditing] = useState(null);\n  const [filterCat, setFilterCat] = useState(\"all\");\n  const [filterAcc, setFilterAcc] = useState(\"all\");\n  const [filterMonth, setFilterMonth] = useState(\"\");\n  const [search, setSearch] = useState(\"\");\n\n  const getCat = id => data.categories.find(c => c.id === id);\n  const getAcc = id => data.accounts.find(a => a.id === id);\n\n  const filtered = data.expenses.filter(e => {\n    if (filterCat !== \"all\" && e.categoryId !== filterCat) return false;\n    if (filterAcc !== \"all\" && e.accountId !== filterAcc) return false;\n    if (filterMonth && !e.date?.startsWith(filterMonth)) return false;\n    if (search && !e.name.toLowerCase().includes(search.toLowerCase())) return false;\n    return true;\n  }).sort((a, b) => new Date(b.date) - new Date(a.date));\n\n  const saveExpense = (exp) => {\n    if (editing) {\n      setData(d => ({ ...d, expenses: d.expenses.map(e => e.id === exp.id ? exp : e) }));\n    } else {\n      setData(d => ({ ...d, expenses: [exp, ...d.expenses] }));\n    }\n    setShowForm(false); setEditing(null);\n  };\n\n  const deleteExpense = (id) => setData(d => ({ ...d, expenses: d.expenses.filter(e => e.id !== id) }));\n\n  return (\n    <div className=\"page\">\n      <div className=\"page-header\">\n        <div>\n          <div className=\"page-title\">Expenses</div>\n          <div className=\"page-subtitle\">Track everything, judge nothing</div>\n        </div>\n        <button className=\"btn btn-primary\" onClick={() => { setEditing(null); setShowForm(true); }}>\n          <Icon name=\"plus\" size={15} /> Add expense\n        </button>\n      </div>\n\n      {/* Filters */}\n      <div style={{ display: \"flex\", gap: \"10px\", flexWrap: \"wrap\", marginBottom: \"20px\", alignItems: \"center\" }}>\n        <input value={search} onChange={e => setSearch(e.target.value)} placeholder=\"\ud83d\udd0d Search...\" style={{ padding: \"8px 14px\", borderRadius: \"100px\", border: \"1.5px solid var(--border)\", fontFamily: \"Nunito\", fontSize: \"13px\", outline: \"none\", width: \"180px\", background: \"var(--surface2)\", color: \"var(--text)\" }} />\n        <div style={{ display: \"flex\", alignItems: \"center\", gap: \"6px\" }}>\n          <input type=\"month\" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} style={{ padding: \"8px 14px\", borderRadius: \"100px\", border: \"1.5px solid var(--border)\", fontFamily: \"Nunito\", fontSize: \"13px\", outline: \"none\", background: \"var(--surface2)\", color: \"var(--text)\" }} />\n          {filterMonth && <button className=\"btn btn-ghost btn-sm\" onClick={() => setFilterMonth(\"\")} style={{ fontSize: \"12px\", padding: \"6px 10px\", color: \"var(--text2)\" }}>All time \u00d7</button>}\n        </div>\n        <select value={filterCat} onChange={e => setFilterCat(e.target.value)} style={{ padding: \"8px 14px\", borderRadius: \"100px\", border: \"1.5px solid var(--border)\", fontFamily: \"Nunito\", fontSize: \"13px\", outline: \"none\", background: \"var(--surface2)\", color: \"var(--text)\" }}>\n          <option value=\"all\">All categories</option>\n          {data.categories.map(c => <option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}\n        </select>\n        <select value={filterAcc} onChange={e => setFilterAcc(e.target.value)} style={{ padding: \"8px 14px\", borderRadius: \"100px\", border: \"1.5px solid var(--border)\", fontFamily: \"Nunito\", fontSize: \"13px\", outline: \"none\", background: \"var(--surface2)\", color: \"var(--text)\" }}>\n          <option value=\"all\">All accounts</option>\n          {data.accounts.map(a => <option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}\n        </select>\n        <span style={{ fontSize: \"12px\", color: \"var(--text3)\", marginLeft: \"4px\" }}>{filtered.length} expense{filtered.length !== 1 ? \"s\" : \"\"}</span>\n      </div>\n\n      {filtered.length === 0 ? (\n        <div className=\"empty\"><div className=\"empty-text\">No expenses match your filters</div></div>\n      ) : filtered.map(e => {\n        const cat = getCat(e.categoryId);\n        const acc = getAcc(e.accountId);\n        return (\n          <div key={e.id} className=\"expense-item\">\n            <div className=\"expense-dot\" style={{ background: cat?.color }} />\n            <div style={{ flex: 1 }}>\n              <div style={{ display: \"flex\", alignItems: \"center\", gap: \"8px\", flexWrap: \"wrap\" }}>\n                <div className=\"expense-name\">{e.name}</div>\n                {e.recurring && <span className=\"rec-badge\"><Icon name=\"repeat\" size={10} /> {e.recurringPeriod}</span>}\n              </div>\n              <div className=\"expense-meta\">\n                <span>{cat?.icon} {cat?.name}</span>\n                <span>\u00b7</span>\n                <span>{acc?.icon} {acc?.name}</span>\n                <span>\u00b7</span>\n                <span>{e.date}</span>\n                <span className=\"type-chip\">{e.type}</span>\n                {e.tags.map(t => <span key={t} className=\"tag-chip\"># {t}</span>)}\n              </div>\n              {e.note && <div style={{ fontSize: \"11px\", color: \"var(--text3)\", marginTop: \"3px\", fontStyle: \"italic\", paddingLeft: \"2px\", borderLeft: \"2px solid var(--border)\" }}>{e.note}</div>}\n            </div>\n            <div className={`expense-amount ${e.recurring ? \"recurring\" : \"\"}`}>{data.currency}{fmt(e.amount)}</div>\n            <button className=\"btn-icon\" onClick={() => { setEditing(e); setShowForm(true); }}><Icon name=\"edit\" size={14} /></button>\n            <button className=\"btn-icon btn-danger\" onClick={() => deleteExpense(e.id)}><Icon name=\"trash\" size={14} /></button>\n          </div>\n        );\n      })}\n\n      {(showForm || editing) && (\n        <Modal title={editing ? \"Edit Expense\" : \"New Expense\"} onClose={() => { setShowForm(false); setEditing(null); }}>\n          <ExpenseForm categories={data.categories} accounts={data.accounts} onSave={saveExpense} onClose={() => { setShowForm(false); setEditing(null); }} initial={editing} />\n        </Modal>\n      )}\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500 Stats Page \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction StatsPage({ data }) {\n  const [tab, setTab] = useState(\"categories\");\n  const [month, setMonth] = useState(currentMonth());\n\n  const monthExpenses = data.expenses.filter(e => e.date?.startsWith(month));\n  const total = monthExpenses.reduce((s, e) => s + e.amount, 0);\n  const getCat = id => data.categories.find(c => c.id === id);\n  const getAcc = id => data.accounts.find(a => a.id === id);\n\n  const catSpend = {};\n  monthExpenses.forEach(e => { catSpend[e.categoryId] = (catSpend[e.categoryId] || 0) + e.amount; });\n\n  const accSpend = {};\n  monthExpenses.forEach(e => { accSpend[e.accountId] = (accSpend[e.accountId] || 0) + e.amount; });\n\n  const tagSpend = {};\n  monthExpenses.forEach(e => { e.tags.forEach(t => { tagSpend[t] = (tagSpend[t] || 0) + e.amount; }); });\n\n  const allExpenses = data.expenses;\n  const tagSpendAll = {};\n  allExpenses.forEach(e => { e.tags.forEach(t => { tagSpendAll[t] = (tagSpendAll[t] || 0) + e.amount; }); });\n\n  return (\n    <div className=\"page\">\n      <div className=\"page-header\">\n        <div>\n          <div className=\"page-title\">Statistics</div>\n          <div className=\"page-subtitle\">See where your money flows</div>\n        </div>\n        <input type=\"month\" value={month} onChange={e => setMonth(e.target.value)} style={{ padding: \"8px 14px\", borderRadius: \"100px\", border: \"1.5px solid var(--border)\", fontFamily: \"Nunito\", fontSize: \"13px\", outline: \"none\", background: \"var(--surface2)\", color: \"var(--text)\" }} />\n      </div>\n\n      <div className=\"tabs\">\n        {[\"categories\",\"accounts\",\"tags\"].map(t => <button key={t} className={`tab ${tab===t?\"active\":\"\"}`} onClick={() => setTab(t)}>{t.charAt(0).toUpperCase()+t.slice(1)}</button>)}\n      </div>\n\n      {tab === \"categories\" && (\n        <div className=\"card\">\n          <div style={{ marginBottom: \"8px\", fontSize: \"13px\", color: \"var(--text3)\" }}>Total: <strong style={{ color: \"var(--text)\", fontFamily: \"Nunito\", fontSize: \"18px\" }}>{data.currency}{fmt(total)}</strong></div>\n          <div style={{ height: \"20px\" }} />\n          {Object.entries(catSpend).sort((a,b) => b[1]-a[1]).map(([catId, amt]) => {\n            const cat = getCat(catId);\n            const pct = total > 0 ? (amt / total * 100).toFixed(1) : 0;\n            return (\n              <div key={catId} style={{ marginBottom: \"16px\" }}>\n                <div style={{ display: \"flex\", justifyContent: \"space-between\", fontSize: \"14px\", marginBottom: \"5px\" }}>\n                  <span style={{ display: \"flex\", alignItems: \"center\", gap: \"8px\" }}>\n                    <span style={{ width: \"10px\", height: \"10px\", borderRadius: \"2px\", background: cat?.color, display: \"inline-block\" }} />\n                    {cat?.icon} {cat?.name}\n                  </span>\n                  <span style={{ display: \"flex\", gap: \"10px\", alignItems: \"center\" }}>\n                    <span style={{ fontSize: \"12px\", color: \"var(--text3)\" }}>{pct}%</span>\n                    <strong style={{ fontFamily: \"Nunito\" }}>{data.currency}{fmt(amt)}</strong>\n                  </span>\n                </div>\n                <div className=\"budget-bar-bg\">\n                  <div className=\"budget-bar-fill\" style={{ width: pct + \"%\", background: cat?.color }} />\n                </div>\n              </div>\n            );\n          })}\n          {Object.keys(catSpend).length === 0 && <div className=\"empty\"><div className=\"empty-text\">No data for this month</div></div>}\n        </div>\n      )}\n\n      {tab === \"accounts\" && (\n        <div className=\"card\">\n          {Object.entries(accSpend).sort((a,b) => b[1]-a[1]).map(([accId, amt]) => {\n            const acc = getAcc(accId);\n            const pct = total > 0 ? (amt / total * 100).toFixed(1) : 0;\n            return (\n              <div key={accId} style={{ marginBottom: \"16px\" }}>\n                <div style={{ display: \"flex\", justifyContent: \"space-between\", fontSize: \"14px\", marginBottom: \"5px\" }}>\n                  <span style={{ display: \"flex\", alignItems: \"center\", gap: \"8px\" }}>\n                    <span style={{ width: \"10px\", height: \"10px\", borderRadius: \"50%\", background: acc?.color, display: \"inline-block\" }} />\n                    {acc?.icon} {acc?.name}\n                  </span>\n                  <strong style={{ fontFamily: \"Nunito\" }}>{data.currency}{fmt(amt)}</strong>\n                </div>\n                <div className=\"budget-bar-bg\">\n                  <div className=\"budget-bar-fill\" style={{ width: pct + \"%\", background: acc?.color }} />\n                </div>\n                <div style={{ fontSize: \"11px\", color: \"var(--text3)\", marginTop: \"3px\" }}>{pct}% of spending</div>\n              </div>\n            );\n          })}\n          {Object.keys(accSpend).length === 0 && <div className=\"empty\"><div className=\"empty-text\">No data for this month</div></div>}\n        </div>\n      )}\n\n      {tab === \"tags\" && (\n        <div>\n          <div className=\"card\" style={{ marginBottom: \"16px\" }}>\n            <div style={{ fontFamily: \"Nunito\", fontSize: \"15px\", marginBottom: \"12px\" }}>This month by tag</div>\n            {Object.entries(tagSpend).sort((a,b) => b[1]-a[1]).map(([tag, amt]) => (\n              <div key={tag} style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"center\", padding: \"8px 0\", borderBottom: \"1px solid var(--border)\" }}>\n                <span className=\"tag-chip\"># {tag}</span>\n                <strong style={{ fontFamily: \"Nunito\" }}>{data.currency}{fmt(amt)}</strong>\n              </div>\n            ))}\n            {Object.keys(tagSpend).length === 0 && <div className=\"empty\"><div className=\"empty-text\">No tagged expenses this month</div></div>}\n          </div>\n          <div className=\"card\">\n            <div style={{ fontFamily: \"Nunito\", fontSize: \"15px\", marginBottom: \"12px\" }}>All time by tag</div>\n            {Object.entries(tagSpendAll).sort((a,b) => b[1]-a[1]).map(([tag, amt]) => (\n              <div key={tag} style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"center\", padding: \"8px 0\", borderBottom: \"1px solid var(--border)\" }}>\n                <span className=\"tag-chip sage\"># {tag}</span>\n                <strong style={{ fontFamily: \"Nunito\" }}>{data.currency}{fmt(amt)}</strong>\n              </div>\n            ))}\n            {Object.keys(tagSpendAll).length === 0 && <div className=\"empty\"><div className=\"empty-text\">No tags used yet</div></div>}\n          </div>\n        </div>\n      )}\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500 Analysis Page \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction AnalysisPage({ data }) {\n  const [loading, setLoading] = useState(false);\n  const [result, setResult] = useState(null);\n  const [error, setError] = useState(null);\n  const [rawDebug, setRawDebug] = useState(null);\n\n  // Find most recent month that has expenses\n  const bestMonth = useMemo(() => {\n    if (!data.expenses || data.expenses.length === 0) return currentMonth();\n    const months = data.expenses\n      .map(e => e.date ? e.date.slice(0, 7) : null)\n      .filter(Boolean)\n      .sort()\n      .reverse();\n    return months[0] || currentMonth();\n  }, [data.expenses]);\n\n  const [month, setMonth] = useState(() => bestMonth);\n\n  // Update month if bestMonth changes (e.g. new expense added)\n  useEffect(() => {\n    setMonth(bestMonth);\n  }, [bestMonth]);\n\n  const monthExpenses = data.expenses.filter(e => e.date && e.date.startsWith(month));\n  const getCat = id => data.categories.find(c => c.id === id);\n  const getAcc = id => data.accounts.find(a => a.id === id);\n\n  const generateLocalAnalysis = (expenses, cats, budgets, monthStr) => {\n    const total = expenses.reduce((s, e) => s + (e.amount || 0), 0);\n    const catTotals = {};\n    expenses.forEach(e => {\n      const name = cats.find(c => c.id === e.categoryId)?.name || \"Other\";\n      catTotals[name] = (catTotals[name] || 0) + e.amount;\n    });\n    const sorted = Object.entries(catTotals).sort((a, b) => b[1] - a[1]);\n    const top = sorted[0];\n    const recurringCount = expenses.filter(e => e.recurring).length;\n    const recurringTotal = expenses.filter(e => e.recurring).reduce((s, e) => s + e.amount, 0);\n    const tagSet = [...new Set(expenses.flatMap(e => e.tags || []))];\n\n    const insights = [];\n    if (top) insights.push({ emoji: \"\ud83d\udcca\", title: \"Biggest category: \" + top[0], text: `\u20ac${fmt(top[1])} went to ${top[0]} this month, making up ${Math.round(top[1]/total*100)}% of your spending.` });\n    if (recurringCount > 0) insights.push({ emoji: \"\ud83d\udd01\", title: `${recurringCount} recurring payment${recurringCount > 1 ? \"s\" : \"\"}`, text: `\u20ac${fmt(recurringTotal)} of your spending is automatic. That's ${Math.round(recurringTotal/total*100)}% of your total \u2014 good to keep an eye on subscriptions creeping up!` });\n    if (sorted.length > 1) insights.push({ emoji: \"\ud83d\uddc2\ufe0f\", title: `Spending across ${sorted.length} categories`, text: sorted.slice(0,3).map(([n,a]) => `${n}: \u20ac${fmt(a)}`).join(\", \") + \".\" });\n    if (tagSet.length > 0) insights.push({ emoji: \"\ud83c\udff7\ufe0f\", title: \"Tagged expenses\", text: `You've tagged expenses with: ${tagSet.join(\", \")}. Tags are great for tracking spending across categories!` });\n    const budgetOver = budgets.filter(b => {\n      const spent = expenses.filter(e => e.categoryId === b.categoryId).reduce((s, e) => s + e.amount, 0);\n      return spent > b.amount;\n    });\n    if (budgetOver.length > 0) insights.push({ emoji: \"\u26a0\ufe0f\", title: \"Budget check\", text: `${budgetOver.length} budget${budgetOver.length > 1 ? \"s are\" : \" is\"} over limit this month. No stress \u2014 this is just information, not a judgment!` });\n    else if (budgets.length > 0) insights.push({ emoji: \"\u2705\", title: \"On track with budgets!\", text: \"All your budget categories are within their limits this month. That's something to feel genuinely good about.\" });\n\n    return {\n      headline: `You spent \u20ac${fmt(total)} in ${monthLabel(monthStr)} \u2014 here's a gentle look at where it went `,\n      insights: insights.slice(0, 5),\n      tip: \"Try reviewing your recurring payments once a month \u2014 it's easy to forget subscriptions you no longer use, and even small ones add up!\",\n      encouragement: \"Tracking your money at all is a big deal. Every entry you add is an act of self-care. You're doing great. \"\n    };\n  };\n\n  const runAnalysis = async () => {\n    if (monthExpenses.length === 0) {\n      setError(\"No expenses found for \" + monthLabel(month) + \" \u2014 try a different month!\");\n      return;\n    }\n    setLoading(true);\n    setError(null);\n    setResult(null);\n    setRawDebug(null);\n\n    const summary = monthExpenses.map(e => ({\n      name: e.name,\n      amount: e.amount,\n      category: getCat(e.categoryId)?.name || \"Unknown\",\n      account: getAcc(e.accountId)?.name || \"Unknown\",\n      recurring: e.recurring,\n      tags: e.tags || []\n    }));\n    const totalSpent = monthExpenses.reduce((s, e) => s + (e.amount || 0), 0);\n    const totalBudget = data.budgets.reduce((s, b) => s + (b.amount || 0), 0);\n\n    const systemPrompt = `You are a warm, ADHD-friendly financial assistant. You MUST respond with ONLY a valid JSON object. No markdown. No code fences. No preamble. No explanation. Start your response with { and end with }.`;\n    const userPrompt = `Analyse these expenses for ${monthLabel(month)}: ${JSON.stringify(summary)} Total: \u20ac${fmt(totalSpent)}${totalBudget > 0 ? `. Budget: \u20ac${fmt(totalBudget)}` : \"\"}. Return JSON: {\"headline\":\"...\",\"insights\":[{\"emoji\":\"...\",\"title\":\"...\",\"text\":\"...\"}],\"tip\":\"...\",\"encouragement\":\"...\"}. 3-5 insights, kind tone, no shame.`;\n\n    let usedAI = false;\n    try {\n      const controller = new AbortController();\n      const timeout = setTimeout(() => controller.abort(), 10000);\n      const response = await fetch(\"https://api.anthropic.com/v1/messages\", {\n        signal: controller.signal,\n        method: \"POST\",\n        headers: {\n          \"Content-Type\": \"application/json\",\n          \"anthropic-dangerous-direct-browser-access\": \"true\"\n        },\n        body: JSON.stringify({\n          model: \"claude-sonnet-4-6\",\n          max_tokens: 1000,\n          system: systemPrompt,\n          messages: [{ role: \"user\", content: userPrompt }]\n        })\n      });\n      clearTimeout(timeout);\n\n      if (response.ok) {\n        const d = await response.json();\n        if (!d.error && d.content && Array.isArray(d.content)) {\n          const raw = d.content.filter(b => b.type === \"text\").map(b => b.text).join(\"\").trim();\n          const jsonStart = raw.indexOf(\"{\");\n          const jsonEnd = raw.lastIndexOf(\"}\");\n          if (jsonStart !== -1 && jsonEnd !== -1) {\n            const parsed = JSON.parse(raw.slice(jsonStart, jsonEnd + 1));\n            setResult(parsed);\n            usedAI = true;\n          }\n        }\n      }\n    } catch (e) {\n      // API unreachable \u2014 fall through to local analysis\n      console.log(\"API unavailable, using local analysis:\", e.message);\n    }\n\n    if (!usedAI) {\n      // Generate analysis locally from the data\n      const local = generateLocalAnalysis(monthExpenses, data.categories, data.budgets, month);\n      setResult(local);\n    }\n\n    setLoading(false);\n  };\n\n  return (\n    <div className=\"page\">\n      <div className=\"page-header\">\n        <div>\n          <div className=\"page-title\">Smart Analysis</div>\n          <div className=\"page-subtitle\">Your personal money advisor</div>\n        </div>\n        <input type=\"month\" value={month} onChange={e => { setMonth(e.target.value); setResult(null); setError(null); }}\n          style={{ padding: \"8px 14px\", borderRadius: \"100px\", border: \"1.5px solid var(--border)\", fontFamily: \"Nunito\", fontSize: \"13px\", outline: \"none\", background: \"var(--surface2)\", color: \"var(--text)\" }} />\n      </div>\n\n      <div style={{ fontSize: \"12px\", color: \"var(--text3)\", marginBottom: \"12px\" }}>\n        {monthExpenses.length} expense{monthExpenses.length !== 1 ? \"s\" : \"\"} in {monthLabel(month)}\n      </div>\n\n      {!result && !loading && (\n        <div className=\"card\" style={{ textAlign: \"center\", padding: \"40px\" }}>\n          <div style={{ fontFamily: \"Nunito\", fontSize: \"20px\", marginBottom: \"8px\" }}>Ready to understand your spending?</div>\n          <div style={{ fontSize: \"14px\", color: \"var(--text3)\", margin: \"0 auto 24px\", maxWidth: \"340px\" }}>\n            Get a warm, judgment-free analysis of {monthLabel(month)} with spending patterns, insights, and gentle tips.\n          </div>\n          <button className=\"btn btn-primary\" onClick={runAnalysis} style={{ fontSize: \"15px\", padding: \"12px 28px\" }}>\n            <Icon name=\"sparkle\" size={16} /> Analyse {monthLabel(month)}\n          </button>\n        </div>\n      )}\n\n      {loading && (\n        <div className=\"card\" style={{ textAlign: \"center\", padding: \"40px\" }}>\n          <div style={{ width: \"36px\", height: \"36px\", margin: \"0 auto 16px\", borderRadius: \"50%\", border: \"3px solid var(--berry-light)\", borderTopColor: \"var(--berry)\", animation: \"spin 0.8s linear infinite\" }} />\n          <div style={{ fontFamily: \"Nunito\", fontSize: \"18px\", color: \"var(--text2)\" }}>Thinking about your month...</div>\n          <style>{`@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }`}</style>\n        </div>\n      )}\n\n      {error && (\n        <div className=\"card\" style={{ borderColor: \"var(--berry-mid)\", marginBottom: \"12px\" }}>\n          <div style={{ color: \"var(--berry)\", fontSize: \"13px\", fontWeight: 500, marginBottom: \"6px\" }}>Something went wrong:</div>\n          <div style={{ color: \"var(--text2)\", fontSize: \"12px\", wordBreak: \"break-word\", lineHeight: 1.5 }}>{error}</div>\n          {rawDebug && <div style={{ marginTop: \"8px\", fontSize: \"11px\", color: \"var(--text3)\", fontFamily: \"monospace\", background: \"var(--surface2)\", padding: \"8px\", borderRadius: \"6px\", wordBreak: \"break-word\" }}>Raw: {rawDebug}</div>}\n          <button className=\"btn btn-secondary btn-sm\" style={{ marginTop: \"12px\" }} onClick={runAnalysis}>Try again</button>\n        </div>\n      )}\n\n      {result && (\n        <div>\n          <div className=\"analysis-card\" style={{ marginBottom: \"16px\" }}>\n            <div style={{ fontFamily: \"Nunito\", fontSize: \"20px\", color: \"var(--berry)\", marginBottom: \"4px\" }}>{result.headline}</div>\n          </div>\n\n          <div className=\"card\" style={{ marginBottom: \"16px\" }}>\n            <div className=\"analysis-title\"><Icon name=\"sparkle\" size={18} /> Insights</div>\n            {(result.insights || []).map((ins, i) => (\n              <div key={i} className=\"insight-item\">\n                <div className=\"insight-icon\">{ins.emoji}</div>\n                <div className=\"insight-text\"><strong>{ins.title}</strong><br />{ins.text}</div>\n              </div>\n            ))}\n          </div>\n\n          <div className=\"grid-2\">\n            <div className=\"card\" style={{ background: \"var(--sage-light)\", borderColor: \"var(--sage)\", borderWidth: \"1px\" }}>\n              <div style={{ fontSize: \"12px\", textTransform: \"uppercase\", letterSpacing: \"0.05em\", color: \"var(--sage)\", marginBottom: \"6px\" }}>Tip for next month</div>\n              <div style={{ fontSize: \"14px\", color: \"var(--text)\", lineHeight: 1.5 }}>{result.tip}</div>\n            </div>\n            <div className=\"card\" style={{ background: \"var(--berry-light)\", borderColor: \"var(--berry-mid)\", borderWidth: \"1px\" }}>\n              <div style={{ fontSize: \"12px\", textTransform: \"uppercase\", letterSpacing: \"0.05em\", color: \"var(--berry)\", marginBottom: \"6px\" }}>A note</div>\n              <div style={{ fontSize: \"14px\", color: \"var(--text)\", lineHeight: 1.5 }}>{result.encouragement}</div>\n            </div>\n          </div>\n\n          <div style={{ textAlign: \"center\", marginTop: \"20px\" }}>\n            <button className=\"btn btn-secondary\" onClick={() => { setResult(null); setError(null); }}><Icon name=\"repeat\" size={14} /> Run again</button>\n          </div>\n        </div>\n      )}\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500 Calendar Page \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction CalendarPage({ data }) {\n  const today = new Date();\n  const [viewYear, setViewYear] = useState(today.getFullYear());\n  const [viewMonth, setViewMonth] = useState(today.getMonth());\n\n  const recurring = data.expenses.filter(e => e.recurring && e.recurringPeriod === \"monthly\" && e.recurringDay);\n  const getDayEvents = (day) => recurring.filter(e => parseInt(e.recurringDay) === day);\n\n  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();\n  const firstDay = (new Date(viewYear, viewMonth, 1).getDay() + 6) % 7; // Mon=0\n\n  const monthName = new Date(viewYear, viewMonth).toLocaleString(\"default\", { month: \"long\", year: \"numeric\" });\n  const getCat = id => data.categories.find(c => c.id === id);\n\n  return (\n    <div className=\"page\">\n      <div className=\"page-header\">\n        <div>\n          <div className=\"page-title\">Payment Calendar</div>\n          <div className=\"page-subtitle\">When things leave your account</div>\n        </div>\n        <div style={{ display: \"flex\", gap: \"8px\", alignItems: \"center\" }}>\n          <button className=\"btn btn-secondary btn-sm\" onClick={() => { let m = viewMonth - 1; let y = viewYear; if (m < 0) { m = 11; y--; } setViewMonth(m); setViewYear(y); }}>\u2039</button>\n          <span style={{ fontFamily: \"Nunito\", fontSize: \"16px\", minWidth: \"160px\", textAlign: \"center\" }}>{monthName}</span>\n          <button className=\"btn btn-secondary btn-sm\" onClick={() => { let m = viewMonth + 1; let y = viewYear; if (m > 11) { m = 0; y++; } setViewMonth(m); setViewYear(y); }}>\u203a</button>\n        </div>\n      </div>\n\n      <div className=\"card\" style={{ marginBottom: \"20px\" }}>\n        <div className=\"cal-grid\" style={{ marginBottom: \"8px\" }}>\n          {[\"Mo\",\"Tu\",\"We\",\"Th\",\"Fr\",\"Sa\",\"Su\"].map(d => <div key={d} className=\"cal-header-cell\">{d}</div>)}\n        </div>\n        <div className=\"cal-grid\">\n          {Array(firstDay).fill(null).map((_, i) => <div key={\"e\"+i} className=\"cal-day empty\" />)}\n          {Array(daysInMonth).fill(null).map((_, i) => {\n            const day = i + 1;\n            const events = getDayEvents(day);\n            const isToday = day === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();\n            return (\n              <div key={day} className={`cal-day ${isToday ? \"today\" : \"\"} ${events.length > 0 ? \"has-event\" : \"\"}`} title={events.map(e => e.name).join(\", \")}>\n                <span>{day}</span>\n                {events.length > 0 && <div className=\"cal-day-dot\" />}\n              </div>\n            );\n          })}\n        </div>\n      </div>\n\n      <div className=\"card\">\n        <div style={{ fontFamily: \"Nunito\", fontSize: \"16px\", marginBottom: \"14px\" }}>Recurring this month</div>\n        {recurring.length === 0 ? (\n          <div className=\"empty\"><div className=\"empty-text\">No recurring payments set up yet</div></div>\n        ) : recurring.sort((a, b) => parseInt(a.recurringDay) - parseInt(b.recurringDay)).map(e => {\n          const cat = getCat(e.categoryId);\n          const isPast = parseInt(e.recurringDay) < today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();\n          return (\n            <div key={e.id} style={{ display: \"flex\", alignItems: \"center\", gap: \"12px\", padding: \"10px 0\", borderBottom: \"1px solid var(--border)\", opacity: isPast ? 0.6 : 1 }}>\n              <div style={{ width: \"36px\", height: \"36px\", borderRadius: \"10px\", background: cat?.color + \"30\", display: \"flex\", alignItems: \"center\", justifyContent: \"center\", fontSize: \"16px\" }}>{cat?.icon}</div>\n              <div style={{ flex: 1 }}>\n                <div style={{ fontSize: \"14px\", fontWeight: 500 }}>{e.name}</div>\n                <div style={{ fontSize: \"12px\", color: \"var(--text3)\" }}>{cat?.name} \u00b7 {e.recurringDay}. of month</div>\n                {e.note && <div style={{ fontSize: \"11px\", color: \"var(--text3)\", fontStyle: \"italic\" }}>{e.note}</div>}\n              </div>\n              <div>\n                <div style={{ fontFamily: \"Nunito\", fontSize: \"16px\" }}>\u20ac{fmt(e.amount)}</div>\n                {isPast && <div style={{ fontSize: \"11px\", color: \"var(--sage)\", textAlign: \"right\" }}>\u2713 done</div>}\n              </div>\n            </div>\n          );\n        })}\n      </div>\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500 Notes Page \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction NotesPage({ data, setData }) {\n  const [text, setText] = useState(\"\");\n\n  const addNote = () => {\n    if (!text.trim()) return;\n    const note = { id: uid(), text: text.trim(), date: new Date().toISOString().slice(0, 10), pinned: false };\n    setData(d => ({ ...d, notes: [note, ...d.notes] }));\n    setText(\"\");\n  };\n\n  const deleteNote = (id) => setData(d => ({ ...d, notes: d.notes.filter(n => n.id !== id) }));\n  const togglePin = (id) => setData(d => ({ ...d, notes: d.notes.map(n => n.id === id ? { ...n, pinned: !n.pinned } : n) }));\n\n  const sorted = [...data.notes].sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));\n\n  return (\n    <div className=\"page\">\n      <div className=\"page-header\">\n        <div>\n          <div className=\"page-title\">Notes</div>\n          <div className=\"page-subtitle\">Little reminders for your future self</div>\n        </div>\n      </div>\n\n      <div className=\"card\" style={{ marginBottom: \"20px\" }}>\n        <textarea value={text} onChange={e => setText(e.target.value)} placeholder=\"Remind yourself of a payment, note an upcoming expense, jot down anything...\" style={{ width: \"100%\", border: \"none\", outline: \"none\", fontFamily: \"Nunito\", fontSize: \"14px\", color: \"var(--text)\", resize: \"none\", minHeight: \"80px\", background: \"transparent\" }} />\n        <div style={{ display: \"flex\", justifyContent: \"flex-end\", marginTop: \"8px\" }}>\n          <button className=\"btn btn-primary btn-sm\" onClick={addNote}><Icon name=\"plus\" size={13} /> Add note</button>\n        </div>\n      </div>\n\n      {sorted.length === 0 ? (\n        <div className=\"empty\"><div className=\"empty-text\">No notes yet \u2014 add one above!</div></div>\n      ) : sorted.map(n => (\n        <div key={n.id} className={`note-card ${n.pinned ? \"pinned\" : \"\"}`}>\n          <div style={{ flex: 1 }}>\n            <div style={{ fontSize: \"14px\", color: \"var(--text)\", lineHeight: 1.5 }}>{n.text}</div>\n            <div style={{ fontSize: \"11px\", color: \"var(--text3)\", marginTop: \"4px\" }}>{n.date}</div>\n          </div>\n          <button className=\"btn-icon\" title={n.pinned ? \"Unpin\" : \"Pin\"} onClick={() => togglePin(n.id)} style={{ color: n.pinned ? \"var(--gold)\" : \"var(--text3)\", fontWeight: \"bold\", fontSize: \"12px\", width: \"28px\", height: \"28px\", borderRadius: \"6px\", border: \"1px solid var(--border)\", background: n.pinned ? \"var(--gold-light)\" : \"none\" }}>\n              {n.pinned ? \"\u2605\" : \"\u2606\"}\n            </button>\n          <button className=\"btn-icon\" onClick={() => deleteNote(n.id)}><Icon name=\"trash\" size={14} /></button>\n        </div>\n      ))}\n    </div>\n  );\n}\n\n// \u2500\u2500\u2500 Budgets Page \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction BudgetsPage({ data, setData }) {\n  const [showForm, setShowForm] = useState(false);\n  const [form, setForm] = useState({ categoryId: data.categories[0]?.id, amount: \"\", period: \"monthly\" });\n\n  const month = currentMonth();\n  const monthExp = data.expenses.filter(e => e.date?.startsWith(month));\n  const getCat = id => data.categories.find(c => c.id === id);\n\n  const saveBudget = () => {\n    if (!form.amount) return;\n    const existing = data.budgets.find(b => b.categoryId === form.categoryId);\n    if (existing) {\n      setData(d => ({ ...d, budgets: d.budgets.map(b => b.categoryId === form.categoryId ? { ...b, amount: parseFloat(form.amount), period: form.period } : b) }));\n    } else {\n      setData(d => ({ ...d, budgets: [...d.budgets, { id: uid(), ...form, amount: parseFloat(form.amount) }] }));\n    }\n    setShowForm(false);\n    setForm({ categoryId: data.categories[0]?.id, amount: \"\", period: \"monthly\" });\n  };\n\n  const deleteBudget = (id) => setData(d => ({ ...d, budgets: d.budgets.filter(b => b.id !== id) }));\n\n  return (\n    <div className=\"page\">\n      <div className=\"page-header\">\n        <div>\n          <div className=\"page-title\">Budgets</div>\n          <div className=\"page-subtitle\">Gentle guardrails, not a cage</div>\n        </div>\n        <button className=\"btn btn-primary\" onClick={() => setShowForm(true)}><Icon name=\"plus\" size={15} /> Set budget</button>\n      </div>\n\n      {data.budgets.length === 0 ? (\n        <div className=\"empty\"><div className=\"empty-text\">No budgets set yet. Add one to start tracking!</div></div>\n      ) : data.budgets.map(b => {\n        const cat = getCat(b.categoryId);\n        const spent = monthExp.filter(e => e.categoryId === b.categoryId).reduce((s, e) => s + e.amount, 0);\n        const pct = Math.min(100, (spent / b.amount) * 100);\n        const over = spent > b.amount;\n        const remaining = b.amount - spent;\n        return (\n          <div key={b.id} className=\"card\" style={{ marginBottom: \"12px\" }}>\n            <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"flex-start\", marginBottom: \"12px\" }}>\n              <div>\n                <div style={{ display: \"flex\", alignItems: \"center\", gap: \"8px\", fontFamily: \"Nunito\", fontSize: \"17px\" }}>\n                  <span style={{ width: \"12px\", height: \"12px\", borderRadius: \"3px\", background: cat?.color, display: \"inline-block\" }} />\n                  {cat?.icon} {cat?.name}\n                </div>\n                <div style={{ fontSize: \"12px\", color: \"var(--text3)\", marginTop: \"2px\" }}>{b.period} budget</div>\n              </div>\n              <div style={{ textAlign: \"right\" }}>\n                <div style={{ fontFamily: \"Nunito\", fontSize: \"20px\", color: over ? \"var(--berry)\" : \"var(--text)\" }}>\u20ac{fmt(spent)}</div>\n                <div style={{ fontSize: \"12px\", color: \"var(--text3)\" }}>of \u20ac{fmt(b.amount)}</div>\n              </div>\n            </div>\n            <div className=\"budget-bar-bg\" style={{ height: \"10px\", marginBottom: \"6px\" }}>\n              <div className=\"budget-bar-fill\" style={{ width: pct + \"%\", background: over ? \"var(--berry)\" : cat?.color }} />\n            </div>\n            <div style={{ display: \"flex\", justifyContent: \"space-between\", alignItems: \"center\" }}>\n              <div style={{ fontSize: \"13px\", color: over ? \"var(--berry)\" : \"var(--sage)\" }}>\n                {over ? `\u26a0\ufe0f Over by \u20ac${fmt(-remaining)}` : `\u2713 \u20ac${fmt(remaining)} remaining`}\n              </div>\n              <button className=\"btn-icon\" onClick={() => deleteBudget(b.id)}><Icon name=\"trash\" size={14} /></button>\n            </div>\n          </div>\n        );\n      })}\n\n      {showForm && (\n        <Modal title=\"Set Budget\" onClose={() => setShowForm(false)}>\n          <div className=\"field\">\n            <label>Category</label>\n            <select value={form.categoryId} onChange={e => setForm(f => ({ ...f, categoryId: e.target.value }))}>\n              {data.categories.map(c => <option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}\n            </select>\n          </div>\n          <div className=\"form-row\">\n            <div className=\"field\">\n              <label>Amount (\u20ac)</label>\n              <input type=\"number\" step=\"0.01\" value={form.amount} onChange={e => setForm(f => ({ ...f, amount: e.target.value }))} placeholder=\"0.00\" />\n            </div>\n            <div className=\"field\">\n              <label>Period</label>\n              <select value={form.period} onChange={e => setForm(f => ({ ...f, period: e.target.value }))}>\n                <option value=\"monthly\">Monthly</option>\n                <option value=\"weekly\">Weekly</option>\n              </select>\n            </div>\n          </div>\n          <div style={{ display: \"flex\", gap: \"10px\", justifyContent: \"flex-end\" }}>\n            <button className=\"btn btn-secondary\" onClick={() => setShowForm(false)}>Cancel</button>\n            <button className=\"btn btn-primary\" onClick={saveBudget}>Save Budget</button>\n          </div>\n        </Modal>\n      )}\n    </div>\n  );\n}\n\n\n// \u2500\u2500\u2500 Admin Panel \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n// Password-protected panel for the app owner to configure links.\n// Regular users never see this \u2014 it's hidden behind a secret tap sequence.\nconst ADMIN_PASSWORD = \"bloom2024admin\"; // Change this to something only you know\n\nfunction AdminPanel({ onClose }) {\n  const [authed, setAuthed] = useState(false);\n  const [pw, setPw] = useState(\"\");\n  const [pwError, setPwError] = useState(false);\n  const [cfg, setCfg] = useState(getAdminConfig());\n  const [saved, setSaved] = useState(false);\n\n
